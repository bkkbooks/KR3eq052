body:
  text: 附録募原考募原未詳其義檢字書募廣求也無干人身之義因考素靈諸篇募者幕之訛也幕又從肉作膜劉熙釋名云膜幕也幕絡一體也痿論肝主身之筋膜全元起注云膜者人皮下肉上筋膜也李時珍脈學釋音募與膜同蓋幕本取義於帷幕說文惟在上曰幕耳太陰陽明論脾與胃以膜相連新校正云太素膜作募又邪客篇地有林木人有募筋此募幕易訛之證也其已如此而膜之在軀殼中最為用者為膈幕人鏡經云膈膜者自心肺下與脊脅腹周回相著如幕不漏以遮蔽濁氣不使熏清道是也甲乙經膈俞在第七椎因推之蓋膈幕之系附著脊之第七椎即是幕原也瘧論邪氣內薄於五藏橫連募原也其道遠其氣深歲露篇同王冰注募原謂鬲募之原系新校正云全元起本募作膜太素巢元方並同今以橫連二字觀之則為膈幕之原系無疑矣而幕原又所指不一百病始生篇云腸胃之外募原之間又云或著於腸胃之募原舉痛論云寒氣客於腸胃之間膜原之下又云寒氣客於小腸膜原之間蓋所謂膜原者言膜之在各藏各府之間而遮隔者之原系也各藏各府之間皆有薄膜而外連於皮肉孔穴直其次者謂之幕穴肝幕期門膽幕日月之類豈藏府位於身中而其氣背部則從脊骨間而輸出故謂之腧穴腹部則藏府之幕直著於皮肉故謂之幕穴乎六十七難亦誤作募滑壽遂注云募猶募結之募言經氣之聚於此也亦何不考也此他後世諸家釋募原者多牽強迂謬之說茲舉其一二如下馬玄臺百病始生注云募原之間皮裡膜外也又舉痛論注云膜謂鬲間之膜原謂鬲肓之原張介賓百病始生注云腸胃之外募原之間謂皮裡膜外是皆隱蔽曲折之所氣血不易流通又云募原如手太陰中府為募大淵為原之類也又舉痛論注云膜筋膜也原肓之原也腸胃之間膜原之下皆有空虛之處又瘧論注云諸經募原之氣內連五藏張志聰百病始生注云募原者腸胃外之膏膜又舉痛論注云膜原者連於腸胃之脂膜亦氣分之腠理金匱要略云腠者是三焦通會元真之處理者皮膚藏府之文理也蓋在外則為皮膚肌肉之腠理在內則為橫連藏府之膜原皆三焦通會元氣之處又瘧論注云募原者橫連藏府之膏膜即金匱所謂皮膚藏府之文理乃衛氣遊行之腠理也高世栻瘧論注云橫連膏膜之募原也吳又可溫疫論云疫氣之來從口鼻而入則其所客內不在藏府外不在經絡舍俠脊之內去表不遠附近於胃乃表裡之分界是為半表半裡即針經所謂橫連募原是又云若表裡分傅者邪氣伏於膜原膜原者即半表半裡也高鼓峰四明心決云凡藏與藏府與府或藏與府彼此相接之處中間蓋有虛界之募原而虛界中復有剛柔筋脈其為某藏之筋便為某藏之病譬如胃與小腸相近而邪入於胃與小腸之虛界而彼筋脈屬胃則為陽明瘧也又如肝與脾相近而邪入於肝脾之虛界而筋脈或屬脾便為太陰經瘧矣究之藏府雖病皆因募原之氣遷移也王子接古方選注云瘧邪內薄則邪不在表非但隨經上下其必橫連於膜深入於原矣膜謂鬲間之膜原謂鬲肓之原亦衝脈也靈樞經云肓之原出於脖胦止一穴在臍下同身寸之一寸半經又言邪氣客於腸胃之間膜原之下則膜原又有屬於腸胃者蔣示吉醫意商云胃外肺下即為膈膜前齊鳩尾後齊十一椎周圍著脊以遮隔中下二焦濁氣不使上熏故疫邪亦不得下流伏於隙處也案此雖不明言其名然必指募原蓋本於又可之說劉奎溫疫論類編云膜音莫胸中支腠嵩崖尊生書云募原一說諸書不及朗仲云原者曠野之意在藏府之外與胃相近邪在此其證不怕寒一味發熱不止案考以上諸說募原二字曰為皮裡膜外曰為鬲肓之原曰為募穴原穴肓為腠理曰為膏膜曰為衝脈曰為胸中支膜之原野其不一定如此然因瘧論所言而揆之其地即在形層之內藏府之外俠脊之界吳又可謂之半表半裡者似是但其言未清晰是可惜耳其餘數說未免岐誤學者勿見眩惑焉銅人針灸圖經考拓本銅人針灸圖經三卷繫於明正統八年所重刊首有英宗御製序及伏仰側三圖十六字為一行百六十行為一段五段為一卷每段之首各標而分之別有都數一卷又為五段四邊皆有花草欄格今依此而考其制蓋石二板廣二丈餘高六尺許碑面每十餘字斷為一行百六十行橫為一層凡五層以為五段表裡刻之即為四卷意者石經之設資便於覽誦撫拓必不如尋常碑文就石面上下書丹為行觀唐開成石經而可見也今以此校鏤板正統本徐三友重刊本剝裂泐闕雖間有焉訂訛正謬頗多不啻一紙當瑤琨抑醫家之鴻寶也草餘年前針科醫官山崎子政善得拓本銅人圖經因援引諸書以為之考丙寅仲夏豫亦得一本視之於子政所藏雖其搨稍粗裝潢亦楛然首尾完好無半簡之缺遺最可貴重今以前所考更為改補備録於下宋藝文志曰王惟一新鑄銅人腧穴針灸圖經三卷鄭樵藝文略曰銅人腧穴針灸圖經三卷宋朝翰林醫官王惟一編修天聖中詔以針艾之法鑄為銅人式王應麟玉海曰天聖針經五年十月壬辰醫官院上所鑄腧穴銅人式二詔一置醫官院一置大相國寺仁濟殿先是上以針砭之法傳述不同命尚藥奉御王惟一考明堂氣穴經絡之會鑄銅人式又纂集舊聞訂正訛謬為銅人腧穴針灸圖經三卷至是上之摹印頒行翰林學士夏竦為序曰聖人有天下論病以及國原診以知政王澤不流則奸生於下故辨淑慝以制治真氣不榮則疢動於體故謹醫砭以救民昔聖祖之問岐伯以為善言天必有驗於人上下有紀左右有象督任有會腧合有數盡書其言藏金蘭之室洎雷公請問其道乃坐明堂以授之後世言明堂者以此針艾之法舊列王官之守思革其謬王惟一授禁方精厲石定偃側於人形正分寸於腧幕總會諸說勒成三卷又以傳心豈如會目著辭不如按形復鑄銅人為式內分藏府旁注溪谷竅而達中刻題於側將使多瘠咸詔巨刺靡差案說蠲疴若對於涪水披圖洞視如舊飲於上池保我黎庶介乎壽考昔夏後敘六極以辨疾帝炎問百藥以惠人當遜德歸功矣序以天聖四年歲次析木秋八月丙申上案此序石本及正統刻本徐三友本並闕特金大定本載之題云翰林學士兼侍讀學士景靈宮判官起復朝奉大夫尚書左司郎中知制誥判集賢院權尚書都省柱國泗水縣開國男食邑三百戶賜紫金魚袋臣夏竦奉聖旨撰文多不同玉海所載系干刪略朝公武郡齊讀書志曰銅人針灸圖三卷王惟德撰仁宗嘗詔惟德考次針灸之法鑄銅人為式分藏府十二經旁注俞穴所會刻題其石併為圖注並主療之術刻板傳於世案惟一作惟德可疑針灸聚英古今醫統亦同蘇頌圖經本草序曰屢敕近臣酬校岐黃內經重定針灸俞穴式範金揭石或鏤板聯編案據蘇氏此序知當時新鑄銅人像而以針灸圖經刻石又鏤板以印行山崎子政藏金大定中所刻本凡五卷雖非天聖之舊尤可貴重焉特以未見宋板為憾耳明一統志曰三皇廟在順天府治南明照坊元元貞初建內有三皇並歷代名醫像東有神機堂內置銅人針灸圖二十有四凡五藏旁注為溪谷所會各為小竅以導其源委又刻針灸經於石其碑之題篆則宋仁宗御書元至元間自汴移置此洪武初銅人取入內府圖經猶存熊均醫學源流曰宋咸淳間翰林醫官朝散大夫殿中省尚藥奉御騎都尉王惟一編修金本卷首署名如此銅人腧穴針灸圖經凡五卷案咸淳南宋度宗時號而以惟一為咸淳人誤甚又案前所引諸書並云三卷蓋宋本之舊為然而至金分為五卷又明重定時仍宋本而附都數一卷以為四卷今熊氏所見乃繫於金本英宗實録曰正統八年三月乙亥御製重修銅人腧穴針灸經序出第一百二卷中案序文正與石本及板本同豫以金本及正統原刻板本徐三友本萬曆壬寅校刊參對之文字互有異同而不如石本及金本之端正也山崎子政云明滑壽著十四經發揮一依金蘭循經云然其所引循經文與銅人毫無差異乃知循經全取諸銅人而滑壽未嘗見銅人也蓋元明之際隱晦罕傳英宗之重修抑繇此乎丘浚明堂經絡圖序曰考史宋仁宗天聖中命尚藥奉御王惟一考明堂氣穴經絡之會鑄銅人式惟一又訂正訛謬為銅人腧穴針灸圖經上之詔摹印頒行其後又有石藏用者按其狀繪為正背二圖十二經絡各以其色別之意者京口所刻即其圖之遺歟出瓊臺會稿毛奇齡新刻銅圖石經序曰銅圖石經者宋天聖中禁方書也範銅象人分布腧穴於其身而畫之竅之且制經三卷播之石案圖考經其諸視夫藏絡也亦猶視夫肌發也暨其後而石已泐銅漫矣明正統中覆命礱其石範其銅官醫守之且加詳焉今則銅再毀石再裂醫院所守已蔑略無有友刻舊本圖經三卷授豫敘者喜而嘆曰此得非長桑所遺者乎出西河合集朱彜尊腧穴圖拓本跋曰京師太醫院三皇廟腧穴圖傳是宋天聖年鑄舊有石刻針灸經仁宗御書其額靖康之亂自汴輦入金城謂安撫使王楫使宋以進於元者世祖命阿尼哥新之至元二年銅人象成周身腧穴脈絡悉具注以水關竅畢達明裕陵命工重修制序載實録萬曆初先少保官太醫院使復時加洗濯焉言明堂針灸自黃帝始其後膏肓孔穴側偃流注三部五藏十二經失之毫釐悔且無及學醫者試摺是圖掛於壁晨夕省視之亦仁術之一端也出曝書亭集案萬曆中巡按山西監察御史趙文炳含章重刊銅人圖四大幅今摺而插入於靳賢針灸大成帙中以傳趙大成序云令能匠於太醫院肖刻銅人著其穴並刻畫圖令學者便覽而易知焉然則朱氏所跋蓋趙所刻原本而非銅人經也又案一統志云元至元間自汴移置此日下舊聞引燕都遊覽志亦云爾而朱氏為靖康之亂輦入金者恐誤且考元史按撫使王楫使宋而進於元者乃銅像非碑石也蓋此跋湊合元史及一統志一時偶然所作故有此等差舛不足深咎也姜希轍重刊銅人針灸經序曰針灸圖經者宋天聖中禁方書也範銅象人分布腧穴於其身而畫之竅之且制經三卷播之石案圖考經其諸視夫藏絡也如視肌發甚盛事也暨其後而石已泐銅已漫矣明正統中覆命礱其石範其銅官醫守之且加詳焉今則銅毀石裂蔑略罔存偶從敝篋中忽檢得舊本圖經三卷案姜字公望康熙甲戌序此書雍正甲寅間鐫即與徐三友本無異同蓋翻雕徐本者其得舊本云者不過欺人耳而其序全襲毛西河但少改西河之聱牙而為平坦矣意者姜偶見此序於毛集中因冠徐本之首題以已名以眩干世此可鄙也附銅像考周密齊東野語曰嘗聞舅氏章叔恭者昔倅襄州日嘗獲試針銅人全像以精銅為之腑臟無一不具其外俞穴則錯金書穴名於旁背面二器相合則渾然全身蓋舊都用此此試醫者其法外塗黃蠟中實以汞俾醫工以分折寸按穴試針中穴則針入而汞出稍差則針不可入矣亦奇巧之器也案舊都謂汴梁宋之故都也據夏竦序及朝志乃是天聖所鑄物耳前此無外塗黃蠟中實以汞之說然因竅而達中刻題於側等文觀之必不別物也元史藝工傳曰中統中尼波羅國人阿尼哥從帝師入見帝問何所能對曰臣以心為師頗知畫塑鑄金之藝帝命取明堂針灸銅像示之曰此按撫王楫使宋時所進歲久闕壞無能修完之者汝能新之乎對曰臣雖未嘗為此請試之至元二年新像成關鬲脈絡皆備金工嘆其天巧莫不愧服蔣一葵長安客話曰太醫院署有古銅人虛中注水關竅畢通古色蒼蒼然射目相傳海潮中出者案此未詳何時所造或恐亦是宋物豈正統御序所謂銅像昏暗者與明史凌雲傳曰云善針孝宗聞云名召至京命太醫官出銅人蔽以衣而試所刺無不中乃授御醫案此正統重作物本朝醫考載竹田明室洪武中入明載銅人歸聞其制如夏竦所言正是正統以前仿舊式而造者後毀於明歷之災實可惜也又案毛奇齡後鑑録張獻忠傳載蜀府醫院有銅人以楮摹其竅令醫者針之差者即取金鎗刺醫者竅蓋其制與北京物同清英廉等日下舊聞考曰先醫廟外北向者為藥王廟有銅人像蓋即明英宗時所修也臣等謹案針灸圖石刻今尚存乃明時重摹上石者觀後英宗序略可證彭孫貽客舍偶聞曰黃帝有明堂經偃側人形圖明堂孔穴圖皆針灸書也太醫院古銅人宋元遺制依明堂孔穴鐫竅以驗針師宣德時江南凌雲字漢章號神針宣宗召試太醫院糊銅人孔竅試之凌雲七十二針無遺穴乃補御醫銅人歷年既久光鑑毛髮天兵入都院中人員流散光祿寺侵院地以自廣徙銅人於醫王殿銅人時現形故地見者多疾病一日殿中無故火發殿燼銅人不損光祿急退侵地建室安銅人病者乃愈吳長元宸垣識略曰三皇廟內有針灸經石刻元元貞初制其碑之題篆則宋仁宗御書至元間自汴移至此者今所存乃明時重摹上石院署有古銅人虛中注水關竅畢達古色蒼碧瑩潤射目相傳從海中湧出者按銅人像在藥王廟神像前作於宋天聖時元至元間修之明英宗時又修之海中湧出殆傳訛爾案據三書所載毛西河銅毀石裂之說殆屬虛妄可疑矣屠蘇考韓鄂歲畢紀麗曰俗說屠蘇乃草菴之名昔有人居草菴之中每歲除夜遺閭里一藥貼令囊浸井中至元日取水置於酒樽閣家飲之不病瘟疫案事言要玄引歲華紀注屠蘇即菖蒲酒未知所據龐安時傷寒總病論曰通俗文曰屋平曰屠蘇廣雅云屠蘇庵也然屠蘇平而庵圓所以不相同今人寒日廳事下作板閣是也尊貴之家閣中施羽帳錦幃聚會以禦寒故正旦會飲闢溫酒而以屠蘇為名也案袁文甕牖間評引龐說云屠蘇平屋也可以御風寒則歲首屠蘇酒示取其御風寒而已趙彥衛云麓漫抄曰正月旦曰世俗皆飲屠蘇酒自幼及長或寫作屠蘇案恐廜㢝誤千金方云屠蘇之名不知何義按宗懍荊楚歲時記云是進椒柏酒飲桃湯服卻鬼丸敷於散次第從小起注云以過臘日故崔實月令過臘一日謂之小歲又曰小歲則用之漢朝元正則行之晉世蓋漢嘗以十月為歲首也又云敷於散即胡洽方云許山赤散並有斤兩則知敷於音訛轉而為屠蘇小歲訛而為自小起云案今考荊楚歲時記文云進椒柏酒飲桃湯進屠蘇酒膠牙餳下五辛盤進敷於散服卻鬼丸乃屠蘇敷於明是為二藥豈彥衛所睹本脫屠蘇酒三字耶且杜公瞻注云敷於散出葛洪煉化篇考之肘後方其方正同而無許山赤散之說亦可疑耳又案竇蘋酒譜云今人元日飲屠蘇酒云可以闢瘟氣亦曰監尾酒或以年高最後飲之故有尾之義爾案監尾之義有數說今不蘩引洪邁容齊隨筆云今人元日飲屠蘇酒自小者起相傳已久然固有來處後漢李膺社密以黨人同系獄元日於獄中飲酒曰正旦從小起時鏡新書晉時有問董勳者曰正旦飲酒先飲小者何也勳云俗以小者得歲故先飲酒賀之老者失歲故後飲酒案莊綽雞肋編作罰之明非是小歲之訛彥衛疏謬殊甚豫又案從小者起其說猶未的確因考蓋此藥有大黃烏頭有毒之品故不宜多服即本草用毒藥先起如黍粟之意肘後屠蘇酒法後云從小至大少隨所堪千金外臺亦云屠蘇之飲先從小起多少自在可知小非年少之義千金方小金牙散外臺暴症虎杖酒之類亦並云自少起可以證也然傳訛已久不可得而改矣盧柳南小簡云正旦飲屠蘇酒必自卑幼始是教卑幼不遜也月正元日一歲始不可不正長幼之分故余家必先長者君貺余屠蘇余敢以飲屠蘇之禮為君告案趙彥衛以屠蘇為敷於之訛其謬前已辨之而敷於名義亦未詳之今肘後方作藥千散外臺引古今録驗作於敷散宋臣校正云肘後作敷於知今本肘後誤寫爾方密之物理小識云葛洪練化篇敷子散用柏子仁麻仁細辛乾薑附子丸服之劉次卿以敷子散和雄黃智按今本草作敷於散訛豫因竊謂敷附一音方中有附子即附子散耳假而為敷子轉而為敷於倒而為於敷訛而為藥千竟至不可知其義矣姑附於此黃公紹韻會舉要曰博雅廜㢝庵也廣韻又酒名元日飲之可除溫氣四時纂要作屠蘇云思邈庵名一云屠者屠絶鬼氣蘇者蘇醒人魂也案事文類聚引四時纂要云屠蘇思邈庵名一云屠割也蘇腐也月令廣義亦同楊慎丹鉛總録曰蕭子云雪賦曰韜罦罳之飛棟沒屠蘇之高影杜子美冷淘詩曰願憑金騕裊走置錦屠蘇屠蘇庵也廣雅曰屠蘇平屋也案今本廣雅作廜㢝庵也通俗文曰屋平曰屠蘇魏略曰李勝為河南太守郡廳事前屠蘇壞應璩與韋仲將書屠蘇發撤孫思邈有屠蘇酒方蓋取庵以名故元日有屠蘇飲何遜詩郊郭勤二頃形體憩一蘇又大冠亦曰屠蘇禮曰童子幘無屋凡冠有屋者曰屠蘇晉志元康中商人著大鄣諺曰屠蘇鄣日覆兩耳會見暍兒作天子案酉陽雜俎寶曆中長樂里門有百姓刺臂數十人環矚之忽有一人白襴屠蘇少頃微笑而去屠蘇蓋赤謂大冠耳又楊時偉洪武正韻箋云今吳中童男女發外畜發寸許者為屠蘇頭訛為多蘇頭甚似屋外屠蘇郎瑛七修類稿曰屠蘇本古庵名也當從廣字頭故魏張揖作廣雅釋庵以此廜廣蘇二字今以為孫思邈之庵名誤矣孫公特書此二字於已庵未必是此屠蘇二字解之者又因思邈庵出闢疫之藥遂曰屠絶鬼氣蘇醒人魂尤可笑也其藥豫嘗記三因方上有之今曰酒名者思邈以屠蘇庵之藥與人作酒之故耳案屠蘇之名見梁宗懍荊楚歲時記而其方出肘後方引晉陳延之小品方俱在思邈前此說皆誤龔廷賢壽世保元曰屠蘇是羽帳名豐貴之家正旦眷屬會羽帳之中飲此酒以闢瘟疫邪氣案此原於龐安常之說盧照鄰長安古意有翡翠屠蘇鸚鵡杯蓋此之謂田藝蘅留青日禮曰屠蘇一作酴酥孫思邈庵名案洪武正韻酴酥酒名亦藥名高士奇天祿識余云酒本名酴酥更訛屠蘇李時珍本草綱目曰蘇鬼蟲鬼名此藥屠割鬼爽故名或云草菴名也案鬼蟲字無所考酉陽雜俎僛一名蘇又作魌乃方相倛頭或恐鬼蟲乃魌之訛方以智通雅曰詩話補遺云周王褒詩繡桷畫屠蘇屠蘇草也畫於屋上因以名屋遂作屠蘇案當作廜㢝智謂解定畫於屋上以取名亦非蓋闊葉草也今廣西猺人中呼大葉似蒿者為頭蘇頭屠音近正因其有蔭而名屋也紫者曰紫蘇荏曰白蘇水蘇曰雞蘇荊曰假蘇積雪草曰海蘇石香薷曰石蘇蘇亦辛草之總名遊宦紀聞曰三山亦呼茨葉為大蘇案千家詩王介甫元日詩春風送暖入屠蘇陳生高注云屠蘇香草名釀酒飲之可消疫氣方說豈本此與然而云釀酒飲之則似不知有屠蘇酒之法焉正字通云闊葉草曰屠蘇後因為屋名庵名飲名周祈名義考曰博雅廜廣蘇庵也通俗文屋平曰廜廣蘇四時纂要作屠蘇又廣韻酴酥酒名玉篇麥酒不去滓飲是屠蘇為屋酴酥為酒本不相混也唐人詩手把屠蘇讓少年先把屠蘇不讓春誤以屠蘇為酴酥後人遂謂屠蘇又為酒古人正旦飲酒以少者得歲故先飲老者失時故後飲是日酒皆然亦無屠蘇先飲之說或云屠絶鬼氣蘇醒人魂妄說也出格致鏡源王棠知新録曰屠蘇所指非一非專為酒也豫詳屠蘇本草名以草為庵故玉篇云庵也王褒詩繡桷畫屠蘇故後人因以名屋又從屋形因以名帽酒釀於草屋之中因以名酒錦屠蘇當是指帽樂府有插腰銅七首障日錦屠蘇之句案屠蘇名義諸說紛拿如是曰為草菴曰為平屋曰大冠曰帽曰羽帳曰草名而其字則曰屠㢝曰𢉜㢝曰酴酥酥又作𦣑酉蘇𨢭並出集韻今夷考之廜㢝之字見魏張揖廣雅尤為古矣而草菴之說出唐韓鄂歲華紀麗其距晉未遠意此相傳之說足取信焉案王士禎居易録云歲華紀麗海鹽胡震亨所僞撰而錢曾讀書敏求記章丘李中麓藏宋刻木則王說誤耳而廜廣蘇廜㢝另無義訓乃屠蘇從廣者而屠蘇蓋本是草名因假為庵為大冠為帽及羽帳又為酒名自餘如𦣑酉蘇𨢭率皆假借會意不足深考也又案晉書藝術傳單道開日服鎮守藥丸大如梧子有松蜜薑桂茯苓之氣時復飲荼蘇一二升而已蓋荼蘇即酴酥炮炙論序根黃蘇炙千金翼百鍊蘇佛典甜蘇八味之類蘇皆與酥通用非正旦所飲之屠蘇乃酴酒造法見齊民要術而竇蘋酒譜云天竺國謂酒為酥可以證焉荼蘇意是西域語其作酴酥者猶荼靡之為酴釄乎然荼屠一音或借用屠蘇字如留青日札屠蘇一作酴酥是也雖然未知晉書荼蘇即屠蘇也否抑屠蘇之名出自酴酒乎姑録俟識者是正肘後方治一切瘧烏梅丸方後搗篩蜜丸蘇屠曰搗一萬杵屠蘇亦未知何義並記此吳旻屠蘇飲方與肘後諸書所載大異今録下吳旻續扶壽精方屠蘇飲方曰古屠蘇庵仙人遺方年除日五更將一餅入酒純熱閣家各飲一二鍾一年之內瘟不侵染是驗鬼箭羽一錢茅山術二錢赤小豆四十九個乳香一錢梅花瓣一錢桃仁一錢荷花蕊一錢菊花頭一錢吳茱萸三分甘草三分共為細末臘月除日煉蜜和丸如黃豆大成餅用上好雄黃為衣梅雨考安永甲午秋訪林子華良榮偶於櫥中獲其曾祖恆齊先生良以所輯梅雨考一編豫後以讀諸書而所得更續數則周處風土記曰梅熟時雨謂之梅雨陸佃埤雅曰今江湘二浙四五月之間梅欲黃落則水潤土溽礎壁皆汁蒸郁成雨其霏如霧謂之梅雨沾衣服皆敗黦郁故自江以南三月之雨謂之迎梅五月雨謂之送梅轉淮而北則否亦梅至北方多變而成杏故人有不識梅者地氣使然也陳藏器本草拾遺曰梅雨水洗瘡疥滅瘢痕入醬易熟江淮以南地氣卑濕五月上旬連下旬尤甚月令土潤溽暑是五月中氣過此節以後皆須曝書畫梅雨沾衣便腐黑浣垢如灰汁有異他水但以梅葉湯洗之乃脫余並不脫袁文甕牖間評曰今人謂梅雨為半月以夏至為斷梅日非也梅雨夏至前後各半月故蘇東坡詩云三旬已過黃梅雨則梅雨為三十日可知矣西郊野叟庚溪詩話曰江南五月梅熟時霖雨連旬謂之黃梅雨然少陵曰南京西浦道四月熟黃梅湛湛長江去冥冥細雨來蓋唐人以成都為南京則蜀中梅雨在四月也及讀柳子厚詩曰梅實迎時雨蒼茫值曉春愁深楚猿夜蘿斷越雞晨海霧連南極江云暗北津素衣今盡化非為帝京塵此子厚在嶺外詩則南粵梅雨又在春末知是梅雨時候所至早晚不同范成大吳船録曰蜀無梅雨子美梅熟時經行偶值雨耳恐後人便指為梅雨故辨之趙叔向肯綮録曰今人謂梅雨梁元帝纂要云梅熟而雨曰梅雨風俗占曰芒種日謂之入梅夏至日午後為梅盡入時號曰時雨合共三十日郎瑛七修類稿曰碎金集云芒種後逢壬入梅夏至後逢庚出梅神樞經又云芒種後逢丙入梅小暑後逢未出梅人莫適從豫意作書者各自以地方配時候而云然耳杜子美詩云云蓋唐人以成都為南京則蜀中梅雨在四月矣柳子厚詩云云此子厚嶺外之作則又知南粵之梅雨三月矣東坡吳中詩曰三旬過久黃梅雨萬里初來舶𧏿風又埤雅云江湘二浙四五月間有梅雨圭主敗人衣服豫嘗亦戲為詩曰千里殊風百里俗也知天地不相同江南五月黃梅圭主人在魚鹽水中是知天地時候自有不同如此瀛奎律髓惟北土無梅雨或謂蜀亦無梅雨杜以為四月柳以為三月豈梅熟有先後異乎李時珍本草綱目曰梅雨或作黴雨言其沾衣及物皆生黑黴也芒種後逢壬為入梅小暑後逢壬為出梅又以三月為迎梅雨五月為送梅雨此皆濕熱之氣郁遏薰蒸釀為霏雨人受其氣則生病物受其氣則生黴故此水不可造酒醋其土潤溽暑乃六月中氣陳氏之說誤矣案時珍食物本草逢壬為出梅作逢庚為出梅霏雨下有或成狂注時作時止陰晴不定十二字條末云惟以之煎茶則滌腸胃宿垢味美而神清也又案吳文炳食物本草云烹茶尤佳勝諸雨水何鎮本草必讀類纂云江南習尚受梅雨烹茶其色味極美用大缸裝水煅以赤炭每缸數塊澄去滓另以淨甕收貯有留數年不變者諸物與衣帛沾之則腐黑也謝肇浙五雜組曰四時纂要云梅熟而雨曰梅雨瑣碎録云閩人以立夏後逢庚日為入梅芒種後逢壬為出梅按梅雨詩人多用之而閩人所謂入梅出梅者乃黴濕之黴非梅也又云江南每歲三四月苦霪雨不止百物黴腐謂之梅雨蓋當梅子青黃時也自徐淮而北則春夏常旱至六七月之交愁霖不止物始黴焉俗亦謂之梅雨蓋黴與梅同音也商浚博聞類纂曰歷者𧓿𧓿也立夏後逢壬日入蟲尸𮥼夏至後逢庚日出蟲尸𮥼如立夏後五日遇壬則𧓿高五尺如十二日逢壬則𧓿高一丈二尺遇辛日則出蟲尸𮥼高一丈二尺如物在一丈三尺則蟲尸𮥼不至蒸也案蟲尸𮥼正韻謨杯切音枚塵也楚辭九懷霾土忽兮蟲尸𮥼蟲尸𮥼一作海蓋霏雨如塵故謂之蟲尸𮥼耳馮應京月令廣義曰通書黃梅雨四十許日出梅則入伏臞仙肘後經芒種逢丙日入黴小暑逢未日出黴黴黰音軫溽濕之氣也一作黴𡛂廣雅黰又作𧑓又云通書芒種後逢壬日或庚或丙日進梅閩人以壬日進梅前半月為立梅立梅有雨旱按天道自南而北凡物候先於南方故閩粵萬物早熟半月始及吳楚今驗江南梅雨將罷而淮上方梅雨又逾河北至七月少有黴氣而不之覺矣以此言之壬丙進梅不及定擬固當易地而論之耳周文華汝南圃史曰芒種逢壬便立梅遇辰則絶陸務觀劍南集曰輕雷轆轆斷梅初自注鄉人謂梅雨有雷曰斷梅朱國禎湧憧小品曰俗語芒種逢壬便立黴黴後積水烹茶甚香冽可久藏一交夏至便迥別矣試之良驗細思其理有不可曉者或者夏至一陰初生前數日陰正潛伏水陰物也當其伏時極淨一切草木飛潛之氣不能雜故獨存本色為佳但取法極難須以磁盆最潔者布空野盛之沾一物即變貯之尤難非地清潔且墊高不可某年無雨挑河水貯之亦與常水異而香冽不及遠矣張存紳雅俗稽言曰南人以衣物班黑謂之上梅以四五月為梅天其雨謂之梅雨一曰黴雨又曰煤雨言衣黑如煤也按周處風土記夏至前雨名梅雨而歲時記事江南三月為迎梅雨五月為送梅又埤雅閩人以立夏後逢庚曰入梅芒種後逢壬日出梅又碎金芒種後逢壬曰入梅夏至後逢庚日出梅又神樞芒種後逢酉日入梅小暑後逢未日出梅諸說不一要之芒種逢酉之說近是蓋其時雨能斑衣也又按楚辭顏黴黎以沮敗兮注黴音眉面黑也說文物中久雨青黑曰黴然則斑衣之梅當作黴方以智通雅曰黴黰音梅軫一作黴黕濕氣著衣物生斑沫也黰又作𧑓沴埤雅以梅子黃時雨曰黃梅雨人遂以黴天為梅天今韻會是之四時纂要云閩人以入夏逢庚入梅芒種逢壬乃出梅今江淮以芒種逢丙始入小暑逢未乃出張自烈正字通曰黴莫裴切音枚項甌東曰江南以三月為迎梅雨五月為送梅雨或言古語黃梅時節家家雨故云張蒙溪謂梅當作黴雨中暑氣也黴雨善汗衣服故人云黴涴言為黴所壞也按埤雅風土記皆作梅雨義與黴通存備考正雍正重修松江府志曰芒種後遇壬則入梅夏至後遇庚為出梅時梅子正黃遇雨謂之黃梅雨又雨氣沾衣物多腐壞故字亦從黴夏至後半月為時雨時亦從黑茲蒙此義也又云芒種後如第五日遇壬則梅高五尺十二日過壬則梅高一丈二尺度物之高下過此則不蒸濕也虞兆隆天香樓偶得曰黃梅今吳楚以芒種後壬日立梅王日芒種即是立梅夏至後庚日出梅庚日夏至即是出梅若芒種後逢壬早夏至後逢庚遲則梅多至十八日芒種後逢壬遲夏至後逢庚早則梅少僅八日俗每以此占黴氣之深淺殊不知天下雖有不齊而歲序初無伸縮壬庚遲早系偶然相俱烏足以限黴氣乎冬蟲夏草考寬政中吳舶載來冬蟲夏草有人問其功用者因匯諸書所記以示焉吳遵程本草從新曰冬蟲夏草甘平保肺益腎止血化痰已勞嗽四川嘉定府所産者最佳雲南貴州所出者次之冬在土中身活如老蠶有毛能動至夏則毛出土上連身俱化為草若不取至冬則復化為蟲袁慢恬書隱叢說曰昔有友人自遠來餉豫一物名曰夏草冬蟲出陝西邊地在夏則為草在冬則為蟲故以是名焉浸酒服之可以卻病延年余所見時僅草根之枯者然前後截形狀顏色各別半青者僅作草形半黑者略粗大具有蠕蠕欲動之意不見傳記書之以俟後考云徐昆柳崖外編曰滇南有冬蟲夏草一物也冬則為蟲夏則為草蟲形似蠶色微黃草形似韭葉較細入夏蟲以頭入地尾自成草雜錯於蔓草溥露間不知其為蟲也交冬草漸萎黃乃出地蠕蠕而動其尾猶蓛蓛然帶草而行蓋隨氣化轉移理有然者和鴨肉頓食之大補七十一西域聞見録曰夏草冬蟲生雪山中夏則葉岐出類韭根如朽木凌冬葉乾則根蠕動化為蟲入藥極熱魯華祝衛藏圖識曰冬蟲夏草出撥浪工山本草不載性溫暖補精益髓唐秉鈞文房肆考曰青藜余照載太史董育萬宏偶談四川産夏草冬蟲根如蠶形有毛能動夏月其頂生苗長數寸至冬苗槁但存其根嚴寒積雪中往往行於地上京師藥鋪近亦有之彼尚康熙時也近年蘇郡漸有但古來本草及草木諸典故從未及之未詳性味近吳遵程從新有此品言保肺益腎不道從何考據余仍疑之未敢輕嘗以意察之其不畏寒而行雪中則其氣陽性溫可知應奎書院山長孔老師諱繼元號裕堂系先聖裔桐鄉烏鎮人誠正君子也述伊弟患怯汗大泄雖盛暑處密室帳中猶畏風甚病三年醫藥不效症在不起適戚自川解組歸遺以夏草冬蟲三斤遂日和葷蔬作肴燉食漸至全愈因信此物之保肺氣實腠理確有徵驗嗣後用之俱奏效因信此品功用不下人參吸毒石考陳士鐸石室祕録曰瘡毒初起有一種解毒之石即吸住不下但毒輕者一吸即下毒重者必吸數日始下不可急性而人自取下也此石最妙一石可用三年然止可用以治小瘡口耳大毒癰疽仍須煎湯藥治之為妙王遜藥性纂要曰近見有吸毒石云出西洋放毒上即吸緊不能動拔出毒氣力盡則自脫吳震芳嶺南雜記曰吸毒石乃西洋島中毒蛇腦中石也大如扁豆能吸一切腫毒即發背可治今貨者乃土人捕此蛇以土和肉舂成大圍棋子可吸平常腫毒及蜈蚣蛇蠍等傷置患處黏吸不動毒儘自落其石即以人乳浸之變録色亟遠棄之著人畜亦毒也不用乳浸石即裂矣一石可用數次真腦石置蛇頭不動為驗王丹麓石友贊曰嶺南方物紀吸毒石出西洋色與磁石相類凡身有腫毒或受蟲蠍毒處置石其上毒盡收石內其患即平隨以石浸水中一晝夜出毒便可再用不窮贊云人有疾患若莫可告我切恫癏無方以療石本西洋力兼衆妙能收能出循環愈效袁慢恬書隱叢說曰吳江某姓有吸毒石形如雲南黑圍棋有大腫毒者以石觸之即膠黏不脫毒重者一周時則落毒輕者逾時即落當俟其自脫不可強離也強離則毒終未盡焉俟其落時預備人乳一大碗分貯小碗以石投乳中乃百沸踴躍再易乳復投更沸如是屢次俟沸定則其石無恙以所吸之毒為乳所洗盡也不然其石必粉裂矣云得之於舊家本出於大西洋中傳記不見乃知世間奇物不可以理測也紀盷灤陽消夏録曰左傳言深山大澤實生龍蛇小奴玉保烏魯木齊流人子也初隸持納格爾軍也嘗入谷追亡羊見大蛇巨如柱盤於高岡之頂向日曬鱗周身五色爛然如堆錦繡頂一角長尺許有群雉飛過張口吸之相距四五尺皆翩然而落如矢投壺心知羊為所吞矣乘其未見循澗逃歸恐怖幾失魂魄軍吏塢圖麟因言此蛇至毒而其角能解毒即所謂吸毒石也見此蛇者攜雄黃數斤於上風燒之即委頓不能動取其角鋸為塊癰疽初起時以一塊著瘡頂即如磁吸鐵相黏不可脫待毒氣吸出乃自落置人乳中浸出其毒仍可再用毒輕者乳變緑稍重者變青黯極重者變黑紫乳變黑紫者吸四五次乃可盡餘一二次愈矣余記從兄懋園家有吸毒石治癰疽頗驗其質非木非石至是乃知為蛇角矣按此物荷蘭人間齎來雲龍頭中石也豫弱冠時聞之於賀臺滕舜調云琢龍角所造豫因其言造之其形與舶上物無別試之於小瘡亦黏吸不落乃知紀氏所紀蛇角之說似可信焉跋醫賸三卷附録一卷伯氏廉夫天明戊申所筆記而未及脫稿投之筐笥不復厝意者殆二十年享和辛酉冬免侍直以來葖肥橘黃之暇專從事於毫楮之間平昔起手所注素靈二經長沙之書及其餘撰著至是逐次完局可繕寫者亡慮數十部殆至等身緒餘又取此書加編劃而猶未滿意謂其不論方術之大體而抉瑣末不及理療之切要而搜迂僻自以竹頭木屑視之不欲示人自余觀之此書收録皆醫經所未載方書所未具本草所未採前賢所未辨世人所未察每一事必核其始末究其同異參以證左大則可以裨治術細亦足以博學識無一不可悅目而快意則謂之醫苑之珍珠船可也顧其體例在醫家之書別自一調惟與張季明俞子容之書略相類似宋陳無擇氏嘗以方技之書比四部而四部之外有說之一部張俞二氏之書是已此亦以為說部之一豈止若竹頭木屑至覆庭裝船始見其用也哉與其所注素靈二經長沙之書及其餘諸編均可以垂世而行遠無疑矣及門諸子謀刻諸書然卷帙浩瀚非歲月之所能遽辨也獨此書葉頁不甚多故先付之梓云文化己巳重陽後一日六弟丹波元鼎謹識
