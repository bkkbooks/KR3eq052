body:
  text: 卷下紫色五藏生成篇生於腎如以縞裹紫據宋王栐燕翼貽謀錄及趙彥衛云麓漫抄古之紫赤汁染之與朱相近故論語云奪朱今之紫起宋仁宗晚年時謂之黑紫又謂油紫黝紫以古之紫為淺紫或北紫或赤紫予按經文與烏羽對與炲反神農本草紫草紫芝紫石英屬皆以今之紫得名焉爾雅藐茈草郭璞注可以染紫本草陶注亦云紫草即今染紫者說文紫帛赤青色邢日内論語疏云紫北方間色北方正水黑刻火赤故紫色則知不始於宋時也本草素問皆漢人所撰述許慎亦漢人意今紫古有焉而後失染法至於宋再得之者王趙博治之士何不檢及於此乎世婦女藏衣物於匣中紫赤必分置之不然紫吸赤色變絳家人亦數驗之豈夫子所稱亦今之紫而其云奪者其謂之與是誠臆度錄以徯後考鶻突羹先友奧州志茂吉卿云旦嘗問予曰本草鯽魚附方有鶻突羹未審鶻突是何義予書一紙引援諸說以答之今漫記於下劉孟熙霏雪錄云骨董乃方言初無定字東坡嘗作骨董羹用此二字晦庵先生語類只作汩董字學集要云骨董以魚肉諸物埋飯中謂之骨董飯和羹中謂骨董羹留青日札云賣寶貨諸物兼備者曰骨董鋪村夫稱古董謬矣漁隱叢話作谷董羹通雅引名物考云惠州有骨董羹則鶻突羹耳孫奕示兒編云糊塗讀鶻突或曰不分明也鶻隼也突起鹵莽之狀金壺字考云糊塗音忽突成聊攝注傷寒論云懊憹者俗謂鶻突是也蓋心中憒悶不可名狀之義品字箋云骨指肉中之脆骨董謂蓮之藕芽也未知此說何據藥用後竅新齊諧載回回病不飲藥有老回回能醫者熬藥一桶令病者覆身臥以竹筒插入穀道中將藥水乘熱灌入用大氣力吹之少頃腹中汩汩有聲拔出竹筒一瀉而病愈矣按便秘不中用承氣輩宜用蜜煎姜兌等者以西洋唧筒名契里私打兒鹽水和蜜入筒中以筒嘴插臋竅擠入直腸內甚為捷速兒啼於腹中玉芝堂談薈云雞蹠集王曇逸母孕時腹中聞啼聲宋孝武大明中張暢妾懷孕而於腹中啼聲聞於外又後廢帝元徽中車莞徐垣妻懷孕亦然曠園雜誌云康熙三十八年柏某分巡江西有胥役吳敬婦懷八月腹中忽呱呱作聲一時喧傳時杭州有柴北溟善醫客柏署柏因囑往視見婦極委頓而腹中作聲不止舉家驚恐柴坐定審視良久顧座間有象棋一奩隨手散傾於地令人掖婦逐一拾起納奩中逾時拾至二十三枚而聲止按虞氏正傳云臍帶上疙瘩乃兒口中含者因妊婦登高取物脫出兒口以此作聲令妊婦曲腰向地拾物使兒復得含入口中即止柴乃用此術耳不足為奇予昔聞先慈言予亦在先慈腹中作聲者數次茶功名醫類案載沈誠莊以茶治肅王疾事何喬遠名山藏云西番中國藩籬也秦蜀產茶茶性通利疏胸膈底滯之氣西番人嗜乳酪不得茶則困以病七修類稿亦載此事云蓋以彼欲茶不得則發腫病死矣欲麝香不得則蛇蟲為毒禾麥無矣殊不知貢易不通則命死一旦安得不救也哉滴露漫錄云茶之為物西戎吐蕃古今皆仰給之以其腥肉之食非茶不消青裸之熱非茶不解是山林草木之葉而關係國家大經諸書所記皆以其盪滌胸中之膩也而本草所未論及故表而出焉又國史補載故老云五十年前多患熱黃近代悉無而病腰腳者多乃飲茶所致也按茗見管子茶出王褒僮約及飛燕外傳又吳孫皓賜茶荈於韋曜蓋李唐以前未大行於世也唐開元中泰山靈岩寺有降魔師大興禪教學禪務於不寐又不夕食皆許其飲茶人自懷挾到處煮飲從此轉相仿效遂成風俗至陸鴻漸常熊伯茶道大行詳見封氏聞見記古時有扁鵲療黃經點烙三十六黃經知斯疾多考本草茗清熱解炙煿毒今如本邦亦罕患之者豈茗飲行之驗歟而相感志云吃茶多令人黃後世亦有茶黃之稱則與國史補之說相反若木瘡三因方露宿湯方中用若木瘡一掌大人無辨其為何物焉考程月溪釋方露宿湯詩云露宿青榴皮椿根草果宜杏仁甘草銼烏梅薑片隨知若木瘡是椿根奇效良方亦無若木瘡有椿根皮而施氏續易簡永類鈐方作苦木瘡王氏易簡治痢藥中有苦木桐瘡桐音相近豈桐訛為瘡乎百一選方引泊宅編載椿根止痢之功當並考東醫寶鑑露宿湯方云苦木瘡一掌大即樗根白皮鍾馗本草綱目歷日後出鍾馗一條時珍集解全襲楊用修而不詳藥方所用何物按都卬三餘贅筆云唐故事歲暮賜群臣歷日並畫鍾馗劉禹錫有代杜相公謝鍾馗歷日表云圖寫威神驅除群厲頒行元歷敬授四時弛張有嚴光增門戶之貴動用協吉常為掌握之珍又有代李中丞謝鍾馗歷日表云績其神像表去厲之方頒以曆書敬授時之始按張說謝賜鍾馗及歷日表見文苑英華五百九十六卷乃知聖濟總錄楊起奇效單方所用正是此物也又日下舊聞云明時禁中歲除安放絹畫鍾馗神像像以三尺素木小屏裝之綴錮鐶懸柱最為清雅出舊京遺事龜板馮夢禎快雪堂集載王節齋先生素工醫撫蜀時患蟲病訪知青城山有隱者能治招之不來乃躬造之一宿隱者脈之云此蟲病也問何以致此乃詰其嘗所服藥云素服補陰丸曰是矣其蟲乃龜板所致龜久生之物惟敗板入藥不得已用生解者須酥炙極透應手如粉者良少堅得人之生氣其生氣復續乃為蟲耳此非藥餌所治公自今壽尚可三年猶及生子公遂歸三年生子而卒龜板良藥製法一乖取禍如此以節齋之善醫尚有此矣醫可輕言哉庚寅八月廿一日聞之姜子幹按王節齋本草集要云龜乃陰中至陰之物稟北方之氣而生故能補陰血不足又方家以其靈於物故用以補心甚效此說蓋出於丹溪王氏深信丹溪不啻筆之於書自用以取禍如此抑似愚焉然龜板為蟲之說亦難信據而又紫桃軒雜綴所載一事殆與此相類云昔潤州一大老性喜服食所制補劑中用敗龜板餌之垂十年頗健朗晚歲忽患蟲膈厭厭就盡乃謁白飛霞飛霞診視良久曰此瘕也公豈餌龜板藥耶今滿腹皆龜吾藥能逐之其在骨節膚腠中者非吾藥所能也公可速治後事乃與赤丸數粒服之下龜如菽大者升余得稍寬不數月仍敝易簀時驗小遺悉有細蟲彷彿龜形其得氣而傳化如此可畏哉紫河車紫河車不可服餌李東璧既辨之今又讀諸書採李氏所未言及者備錄於下程若水醫彀云紫河車本草並無其名今人取其生髮之源混沌之皮包含變化將以補人此未達至理者夫兒在胞始由白露桃花漸而變化藏府四肢百骸以至皮毛骨肉氣血精神無不具備十月滿足乃變化至極之處物極則返之時正是瓜熟蒂懸慄熟自脫之際且其精華皆聚於兒既產其胞衣尚有餘氣存耶未聞慄殼瓜蒂尚有補者其大造丸有服之而效者乃余藥之功非河車力也李日華六研齋筆記云宋元幹吾里奇士以醫遊長安所寓必楚潔種樹引流以自怡見一時貴者競服人胞乃著論排之曰今人食禽卵而棄其殼以其無滋也胞即人殼奈何貴之周亮工書影云親串有從余遊都門者其人謹願生平絕跡北里突生天疱不解所自予忽悟其故解之曰君質弱常服紫河車京師四方雜集患天疱者甚夥所服藥中安知無天疱衣胞此瘡能延子孫氣味所沖尚能中人生子多無皮膚衣胞尤為毒氣所歸君之患必源於此眾皆以為然五雜組所論其意與程李同當參看人參生熟明徐競高麗圖經云人參之干特生在在有之春州者最良亦有生熟二等生者色白而虛入藥則味全然而涉夏則損蠹不若經湯釜而熟者可久留清三朝紀事云我國與明人以人參交易用水漬之明人佯不欲市國人恐朽敗急售多不得價上慮民用不充欲煮而暴之以售諸貝勒難之上不聽令如法以制不急售得價倍常民用以利按本草無人參湯煮之說特馮氏錦囊秘錄云人參微寒溫微溫者言其功用也云微寒者言其所稟也有采來入沸湯略沸即取起焙乾或生置無風處陰乾凡帶生而採者有皮力大過熟而採者無皮力馴臨用切薄片銀石器中浸火熬汁如入丸散隔紙微焙炒如欲久藏炒米拌勻同納瓶中封固則久藏不壞且得穀氣也予試之生者不啻輕虛肉脆而癟皺不若經湯者肉實而肥也今朝鮮所貢皆經湯者如其收藏法唐秉鈞人參考載數款今試之馮氏之法為得矣廣東人參惠州府志云韓宗伯曰坡公羅浮五詠人參地黃甘菊薏苡枸杞蒔于山房之小圃各為詩紀之今羅浮所產惟枸杞薏苡恆有甘菊亦時有之人參地黃即老圃無能識者當時崎嶇萬里從何移根人參之詩曰靈苗此孕育肩股或具體又曰青椏綴紫萼員實墜紅米言之鑿鑿應非浪語然二物不書傳信也又屈翁山廣東新語云廣東無人參而宋廣業羅浮山志會編則云人參羅浮所產殊與本草人參不類狀如仙茅葉細圓有紫花三葉一花者為仙茅一葉一花者為人參根如人字色如珂玉煮汁食之味與人參無別但微有膠漿耳滋補亦如人參山人採作藥餌按羅浮在廣東惠州此則別是一種人參而今舶上廣東人參非廣東所產以其初廣舶載來遂有其名乃與羅浮產者殊異刨參王士禛居易錄載新定刨參之例刨人參親王一百四十名人參七十斤世子一百二十名人參六十斤云云按刨削也高士奇扈從東巡日錄云探參之法以四月及七月裹糧入山其草一莖直上獨出眾草光與曉日相映則刨取其根一窠或四五歧或二三歧者清會典康熙五十三年題准令烏喇採蜂蜜人一年採蜜一年刨參據此則刨參似謂刨取而不經制者人參茈胡薓說文人薓藥草出上黨本草遂謂後世因字文繁遂以參星之字代之從簡便爾然而前漢史游急就篇遠志續斷參土瓜顏師古注參謂人參丹參紫參玄參沙參苦參也又王符潛夫論云治病當得人參反得羅服則本草之言不必矣茈爾雅玉篇及上林賦皆為紫草之紫也惟急就篇云黃芩茯苓岩茈胡顏注茈古柴字而戰國策淳于髡曰今求柴胡桔梗於沮澤則累世不得一焉世稱好古者特用人薓茈胡字而以人參柴胡卻為後世之字且以茈為紫音可笑之甚也時珍云傷寒論尚作薓字作茈字考宋板傷寒論猶作柴參今宋板趙清常所校必非治平之舊但成無己本釋音茈音柴人薓下音參則知古本如此生金腦子晉賈后飲金屑酒死則生金有毒可知矣又梁蕭衍廢齊寶融為巴陵王乃使鄭伯禽詣姑熟以生金進王曰我死不須金醇醪足矣是亦以生金毒殺之也吳錄荊州刺史王睿刮金飲之而死此亦當是生金矣宋文天祥賈似道皆服腦子求死不得惟廖瑩中以熱酒服數碗九竅流血而死此非腦子有毒乃熱酒引其辛香散溢經絡氣血沸亂而然爾又明季遺聞丘瑜初被執即自縊為賊救醒後服冰片死土中燋米酉陽雜俎乾陀國昔屍毗王倉庫為火所燒其中粳米燋者於今尚存服一粒永不患瘧又周櫟園書影云去汀州八十里名藍田石城邑所屬地有山號蠟燭峰圓秀異常山腰環轉一路如帶路產糯米雜砂礫中色若火微煅而文理劃然鄉人病心者拾啖之即愈余曾遊此命小奚數人拾各盈匊幾殆盡矣旋踵視之又累累如貫珠真異事也又吳震芳述異記云楚武昌府漢陽門內舊有陳友諒廣積倉基今皆為民居康熙甲子年有地中掘得黑米者黑如漆堅如石炒之松研為末治膈症如神價比兼金臨海教諭吳牖丹在楚親見言之又王椷秋燈叢話亦載武昌黑米治膈事云天門學宮前明改建北郭倉基地亦掘得黑米治疾頗驗乾隆丙申黃州重修郡學疏浚泮池池底積米甚夥色似漆而堅治病如前人爭取之太守王公廷棟恐系前人鎮壓物禁而掩之按本邦奧州二本松地有名長者倉土中出燋米如諸書所記金峨井先生東遊之時採得而歸詳見其所著考槃堂漫錄中又聞上總州夷灊郡萬木城趾中於草間往往得燋米患痞人水服一粒立愈見房總志料肉豆蔻本草所載肉豆蔻形狀僅其中核耳不知核外有肉包之予常於侍醫桂川公鑑國瑞所啖蠻舶所齎蜜漬者大如鵝蛋而圓香味異常極美此蓋池北偶談所載荷蘭重物中甜肉豆蔻者公鑑云肉豆蔻木本本草收之於芳草部中甚誤考荷蘭藥譜樹如梨葉如桃而小花如薔薇其香可愛花褪後結實形如胡桃第一層為肉極厚可以為蜜漬而食在樹而熟則拆裂第二層為膜著核上如慄荴軟而黃赤其香最馥郁剝下干收以為料物甚佳中核即藥品所用也核外肉厚故對草豆蔻稱肉豆蔻牧靡酈道元水經注牧靡音麻縣名云牧靡可以解毒百卉方盛鳥多誤食烏喙口中毒必急飛往牧靡山啄牧靡以解毒也李奇注漢書云牧靡即升麻也而段柯古云牧靡不知何藥也蓋失考耳予謂方書云無犀角以升麻代之朱二允辨其誤然若用此縣之產其效宜不減於犀角焉薩州曾士考昌啟云牧當是收訛收周同音本草升麻一名周麻可以證焉通雅作收靡縣茯苓茯苓茯神原是一物別錄強判之耳史記龜策傳作伏靈乃神靈二字互用廣雅茯神茯苓也太平御覽引本草經茯苓一名茯神可為證也屈大均云茯者伏也神伏於土中而為苓故曰茯苓苓者靈也神能伏則靈蓋有見於此大洲太田子通澄元有茯苓辨甚為明確薏苡枸杞素問堅而搏如循薏苡子累累然所謂薏苡非粳𥽇而何予嘗多種粳𥽇畦中或有變為薏苡者因知二種原是一類功用亦當不太遠蘇頌云枝無刺者真枸杞也有刺者枸棘也時珍云枸杞二樹名此物棘如枸之刺莖如杞之條故兼名之果如蘇之言當曰杞而不可曰枸杞也予家園圃亦多栽枸棘時或有不生棘者知是猶薏苡與粳𥽇寇氏衍義以枸棘為枸杞一名似是陳廩米顏師古匡謬正俗云本草有陳廩米陶弘景注云此今久倉陳赤者下條有粳米弘景又注云此即今常所食米前陳廩米亦是此種以廩給軍人故曰廩耳按陳廩米正是陳倉米廩即是倉其義無別陶公既知已久入倉故謂之陳而不知呼倉為廩改易本字妄以廩給為名殊為失理萬安方云性全按陳廩米者日本人皆謂在倉廩中經年者誤矣今如諸本草說者廩軍地名米即雖新米如陳米入用藥尤佳余州餘地米必須用陳米也但雖言陳米不可用經兩三年之米只經一年之米宜用之今不見蜀本草者用經數歲之米大謬矣予按大觀本草所引蜀本草與此大異師古唐人已為倉廩之廩則蜀本文說難從焉況廩軍得地名他書所未見不知性全何據云爾滑石本草載滑石初取軟如泥久漸堅時珍云今人亦以刻圖書不甚堅牢高士奇江村歸田集云凍石舊時處州山中往往從璞中剖出初本軟見風結為石故名曰凍其色或淡白淡黃淡青光澤可愛以之鐫刻圖記遠勝銅玉近惟青田舊坑間尚有之凍石絕不可得矣依此說青田凍石蠟凍燈光之屬乃與滑石一類曩西湖田元長善之亦有此說知其言偶相符焉又袁慢恬書隱叢說云湖廣山中多石膏初生似膏液漸凝如礬石人家往往多采之雍正中有人採石膏至一處見小穴中有人語自謂前亦採膏人偶遭山石崩隨塞其出處於中不記年歲朝夕食石膏之未凝者生幸為出我採膏者異之聞之於官官使人驗之果然幕中有識者曰不可驟使見風恐其身僵成石以服石膏日久故也遂以粥飲於穴口漸進之一二十日後始出之外膚如朽腐後亦漸愈二程遺書云南中有人採石石陷壓閉石罅中取石膏食之不知幾年後他人復採石見而引之出漸覺身硬才見風便化為石幕中人亦博識矣又包汝楫南中紀聞云大理石初採時柔軟可卷取出見風始堅勁採石必諳畫理臨採攜畫譜進壑遇可點綴處輒用指法那移添湊片片揭下席捲懷出故大者最難得據二書所載則見風堅結者不特滑石之類然也龍骨陸深金臺紀聞云郿縣河灘上有亂石隨手碎之中有石魚長可二三寸天然鱗鬣或雙或只不等云藏衣笥中能闢蠹魚又平陽府候驛澮河兩岸仄土上皆婦人手跡或掌或拳儼然若印削去之其中復然又大同山中有人骨在山之腰上下五六十丈皆石耳惟中間一帶可四五尺皆髑髏脛節齦齦然關中之山數處亦爾予按倪氏本草匯言龍骨非真龍之骨晉蜀山谷隨地掘之要皆石燕石蟹之倫蒸氣成形石化而非龍化也亦當以儼山所紀推而知已蟾酥蔣一葵長安客話云太醫院例於端陽日差官至南海子捕蝦蟆擠酥以合藥制紫金錠某張大其事備鼓吹旗旛喧闐以往或嘲以詩曰抖擻威風出鳳城喧喧鼓吹擁霓旌穿林披莽如虓虎捉得蝦蟆剜眼精嘉興縣誌云宮中用蟾蜍錠於每歲端午日修合各坊車蝦蟆至醫院者億萬計往時取用後率斃蓋兩目俱廢不能跳躍也東山朱公按朱彝尊年譜高祖儒字宗魯號東山典院事命止刺其一偏得蘇者甚多此事似微然發念甚真為德不淺按內府酥黃丸出於月令廣義其方五月五日以雄黃加硃砂少許研末入真蟾酥和陰乾凡遇惡毒瘡初起以唾磨搽微痛立止紫金錠用蟾酥見於臞仙乾坤生意其方人言巴豆輕粉等凡十五味與是齋諸方所載大異王文謨碎金方取蟾酥法先將皂角三兩煎水三沸旋候冷用大口甕或缸盛水將癩蝦蟆不拘多少入中以稀物覆之勿令跳出過一宿其酥即浮水面若未浮其酥即在身上矣可用竹刀刮下用之又鮑叔鼎醫方約說蟾酥乃治諸蒭之要藥也制合得宜傳服皆可用蛤虫宝皮即蟾皮也大能收毒外貼不可缺也皆本草不載故姑錄於此杬有二種杭有二種其一藥中芫花爾雅所謂毒魚是也其一藏卵果者齊民要術作杬子法所用是也而郭注爾雅云杬大木子似慄生南方皮厚汁赤中藏卵果顏師古注急就篇引郭注云此說誤耳其生南方用藏卵果者自別一杬木乃左思吳都賦所云縣杬杶櫖者非毒魚之杬也顏註明確如此李東壁不讀急就顏注於芫花條載煎汁藏果之說抑失考耳朱錫鬯彝尊著釋杬一篇辨坊本爾雅為杭之訛徵引極博猶且以毒魚藏果為一杬亦失於不檢矣礬礜之訛醫話載劉敬叔異苑曰魏武北征蹋頓升嶺眺矚見一山岡不生草木王粲曰必是古塚此人在世服生礬石死而石氣蒸出外故卉木焦滅即令鑿看果得大墓有礬石滿塋仲宣博識強記皆此類也姚寬西溪叢話云據本經礬石性寒異苑云熱蓋誤矣愚按方書礬石礜石或誤寫仲宣所謂恐礜石也礬石亦出溫泉則不可謂性寒但不如礜之甚熱耳拙者按黃長睿法帖刊誤云王子敬靜息帖云礜石深是可疑事兄喜患散輒發癰散者寒食散之類散中蓋用礜石是熱極有毒故云深可疑也劉表在荊州與王粲登障山見一岡不生百草粲曰此必古塚其人在世服生礜石熱蒸出外故草木焦滅鑿看果墓礜石滿塋又今洛水冬月不冰古人謂之溫洛下亦有礜石今取此石置甕水中水亦不冰又鸛伏卵以助暖氣其烈酷如此固不宜餌服子敬之語實然聊附於此異苑魏武逾頓嶺云云此段本草誤刻在礬石部此云劉表登障別有所出刊誤所載如此甚為明備姚氏豈不見靜息帖耶洪容齋亦有引靜息貼論礜石一則東璧綱目載之芳氏之博治盍檢及於此又以王子敬言考之侯氏黑散亦是寒食散之一外臺有礜石鐘乳必是仲景之舊方巢源論寒食散發候云仲景經有候氏黑散要略黑散方後云常宜冷食自在腹中不下也熱食即下可以互證矣程云來以為黑散宋人校正時所附蓋不考耳笑菌予家一僕於豆州與其友五人得異菌於道傍其狀似松蕈而小稍帶赤色數莖攢簇採歸煮食之旋心如醉稍稍發笑不止一時許目運顛倒不能起口裡黏唾吐之色如磨刀汁繼之以涕泣如許者半日而復故其中有酒人無異平常本邦不產楓樹其令人笑者乃清異錄所謂笑矣乎乎夷堅志載邱岑食蕈事信乎酒能解其毒矣孔雀尾有毒體仁彙編云鴆鳥毒即孔雀毛並膽也用乾葛三兩為末水調頓服良嶺南雜記云孔雀尾金眼有毒孩童戲取銜口中有死者其膽與糞尤毒能殺人品字箋云孔雀之項有毛長一二寸以之畫酒中飲之立死又謂之鴆毒此皆本草所不載亦不可不知也甘露雀餳吳仁杰兩漢刊誤補遺云衡陽嘗有甘露降劉貢父曰此戾氣所成其名雀餳王定國謂當從博識者求甘露雀餳之別仁杰按汝南先賢傳都尉聽事前有甘露降功曹鄭敬曰明府政事未能致甘露但木汁耳又陳祥明中松柏林冬月出木體後主以為甘露之瑞俗呼為爵餳貢父所云其出於此王仲任曰欲驗爾雅之甘露以萬物豐熟災害不生此則甘露之驗其言足以泮群疑也王陶談淵云翰林侍講學士杜鎬博學有識都城外有墳莊一日若有甘露降布林木子侄輩白於鎬鎬味之慘然不懌子侄啟請鎬曰此非甘露乃雀餳大非佳兆郎仁寶七修類稿云雀餳味雖甘色則白濁其臭如松脂嚼之膠舌甘露色微紅凝結如脂如珠馨香而有酒味食之百竅皆爽也按東璧綱目載杜鎬言作甘露非瑞也蓋傳寫之訛耳東都西郊有一鬆樹每冬有雀餳枝葉如凝露土人呼為松蜜云馬肉續醫說載酒製馬毒一則晏子已云懸牛首於門而賣馬肉於內也知是從古非常食之品而周禮六牲馬其一也穆天子傳有獻食馬之文郭景純注云可以供廚膳者由是觀之駿馬駕車而不食猶後世有坐馬菜馬之別與本邦人戒食四足且嚴禁殺馬不啻不充廚膳偶有食之者目以非人聞唯東奧之俗有患黴瘡結毒者餌以自死馬肉經久極有效驗此古人所未言及也底野迦底野迦治眼疾龍樹菩薩眼論摩頂膏方中用之云西番者狀如駝膽又醫方類聚引五藏論云神方千卷藥名八百中黃丸能差千疴底野迦善除萬病職方外紀云如德亞之西有國名達馬斯谷土人制一藥甚良名的里亞加能治百病尤解諸毒有試之者先覓一毒蛇咬傷毒發腫脹乃以藥少許咽之無弗愈者各國甚珍異之鮓答鮓答始見於元楊山居新話陶九成輟耕錄而後世其文字不一沈周座客新聞作赭丹田藝蘅留青日札作鮓單七十一西域聞見錄作劄答並云出牛馬腹中冀越集云馬黑在腎又蟫史云馬墨破之可千葉煎熬用膈噎疾按本邦人以馬腹中石用膈噎余亦試之似飲食稍得下然兩三日後必覺心氣壅悶故病人不肯久服享和紀元夏城東白銀街木匠誤吞鐵釘哽咽不出痛苦欲死醫師數輩環繞無術可施適一老人以藥末水調灌之少選喀一聲釘隨而出眾人驚異訪何藥則云此秘方也不敢告後有一醫懇請之乃云一味馬腹中石也可見其通塞之功耳職方外紀云渤泥島有獸似羊似鹿名把雜爾其腹中生一石能療百病西國極貴重可至百換國王藉以為利又方觀承松漠草云蒙古西域祈雨以楂達石浸水中咒之輒驗楂達生駝羊腹中圓者如卵扁者如虎脛在腎似鸚鵡嘴者良色有黃白駝羊有此則漸羸瘁生剖得者尤靈並是一種之獸楂達亦蓋鮓答耳七修類稿云羊哀形如濕茅紙時亦用之謂治翻胃留青日札云羊哀在腸形如小鼠子可治鬲食反胃余見其三蟫史云按牛有黃狗有寶羊有卵俱在腹中附膽而生羊卵白石色如玉絕類狗寶可治翻胃考本草不特諸獸腹中石淋石癖石亦並治膈噎翻胃又池北偶談載高陽民家子方十餘歲忽臂上生宿瘤痛癢不可忍醫皆不辨何症一日忽自潰中有圓卵墜出尋化為石劉工部霖以一金售之治膈病如神予所識岩槻街一瞽者患囊癰潰爛已久忽迸出圓石十七枚大者如杏仁小者如按豆余得二枚藏之後為人持去恨不試之斯疾樟木蟲體仁彙編治疔瘡及無名腫毒用樟木蟲即人家灶上出者不拘多少研爛敷之少時疔出毒散即消如神效按商浚博聞類纂云曹婆蟲南人謂之𧒚戛蟲江南謂之樟木蟲京師謂之偷油蟲夜則出有翅不飛其走甚疾多入酒食器中臊氣可憎按當塗縣志蜚蠊爾雅謂之蜰俗呼樟木蟲斯邦俗亦呼油蟲然人多不知有治瘡之功矣王永輔惠濟方土牛兒春生牆下作土窩如錢大上圓下尖一名旦谷蟲此即本草所謂沙挼子斯邦俗呼造白蟲徐爾貞醫匯治齁喘用鹽油蟲入竹筒七日化水湧幢小品云蝸蜒即今俗語所謂沿油也按鹽油即沿油本草所謂蜒蚰蟲斯邦俗生吞以治齁喘頗驗靈柴廣筆記五寶丹非完方也無紅鉛靈柴不能奏效按本草蒙筌天靈蓋一名靈山柴丁鳳醫方集宜五寶丹方凡四道其後云鼻子陽物蝕去加天靈蓋五分便能長出誠仙方也明是筆記所用靈柴即天靈蓋也又張筠亭醫門秘旨靈山柴即新生小兒臍帶落下者名同而物異白酒白酒胸痹所用未詳其為何物齊民要術載河東頤白酒白醪酒等造法豈其是耶又隋經籍志有白酒並作物法十二卷白酒方一卷之目抑亦是耶時珍食物本草及彭用光普濟良方楊州府志亦有造法疑非古之白酒食物本草云白酒處處有之以蓼與面為曲釀糯米為酒母以水隨下隨飲初下時味嫩而甘隔宿味老而酢矣普濟良方云糯米一斗隔夜用冷水浸次日蒸熟用井花水淋下白酒麴五稠勻拍在缺邊中間留空得有漿是為白酒若洗以燒酒一罈即蜜淋漓酒楊州府志白酒各州縣皆有用草曲三日可成味極甘美少入水曰水白酒冬月煮過窨之曰臘白酒虞兆隆天香樓偶得以為美酒偶得云古人酒以紅為惡白為美蓋酒紅則濁白則清故謂薄酒為紅友而玉醴玉液瓊漿瓊飴等名皆言白也梁武帝詩云金盃盛白酒正言白酒之美近來造酒家白麵為曲並舂白秫和潔白之水為酒久釀而成極其珍重謂之三白酒於是呼數宿而成之濁醪曰白酒使詩詞家不敢用白酒字失其旨矣然而靈樞經筋篇以白酒和桂且飲美酒則知醫方所用白酒與美酒自別究竟古之白酒不可得而詳焉今且從千金用白酨漿酨漿酢也酢有通氣下痰豁胸利膈之能此乃為得矣薛俊日本寄語白酒門東曬箕靈貓靈貓時珍本草舉數說已似未親睹其物職方外紀云有山貍似麝臍後有肉囊香滿其中輒病向石上剔出之始安香如蘇合油而黑其貴次於龍涎能療耳病寬政癸丑年從崎岙郵致蠻舶所齎一頭先考藍溪公重價購之畜於小檻中其臭異常狀如家貍稍長大尖頭短耳黑鼻巨口其利在於牙爪短而不著地渾身茶褐色黑斑如虎尾頗似雉兩陰間有一囊大如桃即香囊也香如白垽滿則癢悶舉一足開囊著之於柱壁間常與三四人捉之以氍毹蒙其頭令不得咬人因視囊囊左右分開色白有底向上有一小孔如針眼乃香所泄出竅也香以竹篾刮取嗅之與真麝無別與身臭大異經久變黑色此獸行則低首垂尾不聞鳴聲人或觸之嚇如貓時閉窗戶放活雀於堂上出之於檻跳躍捕之而啖甚捷喂之以雀日五六頭先考命二僮豢之年餘而死惜不多取其香而貯焉本草云自為牝牡恐誕矣蓋陰囊之外有香囊兩靡略似牝戶故生此說耳又云糞溺香此亦不然菸草王逋蚓庵瑣語云菸葉出閩中邊上人寒疾非此不治關外人至以匹馬易煙一斤崇禎癸未禁菸之令嚴間私種者問徒法輕利重民不奉詔尋令犯者斬然不久而邊軍病寒無治遂停是禁予兒時尚不識煙為何物崇禎末我地偏處栽種二尺童子莫不食煙風俗頓改按張璐本經逢原云北人藉以闢寒此果信近閱一書載鄂羅斯人言云吃煙草免青腿牙疳之疾蓋其證因寒毒所發也
