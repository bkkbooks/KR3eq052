body:
  text: 卷中病分左右王文正筆録載太祖與張永德洎當時宿將數人同從周世宗徵淮南戰於壽春獲一軍校欲全活之而被瘡已重且自言素有癱風病請就戮及斬之因令部曲視其病患之狀既而睹其藏府及肉色自上至下左則皆青右則無他異中心如線直分之不差發毫焉按以理揆之風屬木木色青此宜然也蓋人身一氣脈也今及其感病左癱者不及右右瘓不及左麻痹亦有如此者又有汗出偏於下右者又有瘡瘍左不淫於右右不浸於下者又有偏腸毒自首至踵平分寒熱者見船窗夜話雖則一氣脈其有界限如此筆録所載恐不虛誕也草子范成大桂海虞衡志云草子即寒熱時疫南中吏卒小民不問病源使人以小錐刺臂及舌尖出血謂之挑草子實無加損於病必服藥乃愈又王貺指迷論瘴瘧云南方謂之中箭亦謂之中草子此蓋沙病而已吹霎癸辛雜識云吹霎二字見劉長卿用之作傷寒感冷意問之則謾云出漢書然莫可考也繼閲方書於香芎散證治云吹霎傷風頭疼發熱此必有所據也豫考諸書香芎散證治未見有載此二字者唯十便良方傷寒門首云傷風吹霎附乃似指咸冒又和劑指南云凡傷風者皆因脫衣感冒被風吹霎著則灑然骨寒毛起惡風自汗者乃是傷風證也凡風吹則體自寒惡風無汗者傷寒證也病從口鼻入仁齋直指云暑氣自口鼻而入凝之於牙頰達之於心胞絡如響應聲此暑自口鼻而入也吳昆升麻葛根湯考云冬月應寒而反大溫民受其濕厲之氣名曰冬溫非時不正之氣由鼻而入皮毛未得受邪故無汗又疫瘧五神丸塞鼻法考云以疫氣無形由鼻而入故亦就鼻而塞之此冬溫疫氣並自鼻而入也又太無神朮散考云山嵐瘴氣謂山谷間障霧濕土敦阜之氣也濕氣蒸騰由鼻而入呼吸傳變邪正分爭又醫學全書云瘴氣之病東南兩廣山峻水惡地溫漚熱春秋時月外感霧毒寒熱胸滿少食此毒從口鼻入也此瘴氣自口鼻而入也廣筆記云傷寒溫疫三陽證中往往多帶陽明者以手陽明經屬大腸與肺為表裡同開竅於口凡邪氣之入必從口鼻故兼陽明證者獨多此陽明病從口鼻而入也張錫駒傷寒直解云霍亂者不從表入不涉形層大邪從口鼻而入直中於內為病最急又云痧者即天地間不正之氣濕熱熏蒸從口鼻而入不吐不瀉腹中絞痛俗所謂絞腸痧是也此霍亂及痧並自口鼻而入也沈明宗金匱注云中惡之證俗謂絞腸痧即臭穢惡毒之氣直從口鼻入於心胸腸胃臟腑也此中惡從口鼻而入也諸書所載已如此世人徒因吳又可之言而知瘟疫自口鼻而已瘴名不一巢源嶺南瘴猶如嶺北傷寒也外臺引備急嶺南率稱為瘴江北總號為瘧此由方言不同非是別有異病按後漢書馬援傳軍吏經瘴疫又宋均傳則云及馬援卒於師軍士多溫濕病由此觀之瘴即溫濕之氣特以南方嶺嶂之地此氣最酷烈故謂之瘴氣也其名稱頗繁今以余所知録下黃芒瘴黃茅瘴南方草木狀青草瘴巢源黃梅瘴新禾瘴桂海雜志黃茆瘴番禺雜記蝦蟆瘴黑腳瘴芳草瘴朴蛇瘴鎖喉瘴蛇瘴聖濟總録冷瘴熱瘴中箭瘴瘧論煙瘴嵐瘴黃瓜瘴蚺蛇瘴蚯蚓瘴烏蜂瘴回頭瘴攪腸瘴管見良方梅瘴托遺鸚鵡瘴北戶録啞瘴嶺南衛生方花風瘴醫林集要烏腳瘴漳州志人瘴使緬録炎瘴楸頭瘴體仁彙編桂花瘴泉州府志暑濕瘴毒水瘴孔雀瘴江米瘴證治大還脖瘴湧幢小品香花瘴毒淫瘴廣東新語菊花瘴粵述瘴母有二嶺表録異云有物自空而下始加彈丸漸如車輪遂四散人中之即病謂之瘴母管見良方云腹脅間有一癖塊而痛者名曰瘴母蓋録異瘴母者乃颶母之屬良方瘴母者乃瘧母之類名同遞異寒熱異治鄺湛若赤雅云炎方土脈疏地氣外泄人為常燠所熯膚理不密兩疏相感章木之氣通焉上脘鬱悶虛煩下體凝冷吐之不可下之不可用藥最難但宜溫中固下升降陰陽及灸中脘氣海三里或灸大指及第五指皆能止熱豫試立驗如用大柴胡湯及麻黃金沸草散青龍湯是膠柱鼓瑟也鮮不敗矣而椿園西域聞見録云溫都斯垣亦西域回國之大者也大黃尤為至寶以黃金數十倍兌換蓋其地之一切疾病瘡瘍得大黃即愈百不失一貴客來及大筵宴皆以大黃代茶若經年不服大黃則必死故雖貧苦小回亦必有一半兩大黃囊系胸前舌舔而鼻嗅之考二書所載乃內經所謂腠理開閉之異寒方以寒熱方以熱之義亦不可不知也廉瀝先友篁墩吉虛士安嘗問豫廉瀝何病豫茫然不能答後讀唐張彥遠法書要録云陶隱居梁武帝啓云治廉瀝一紙凡二篇並是謝安衛軍參軍任靖書後又治廉瀝貍骨方一紙是子敬書亦似摹迹又宋董逌廣川書跋云貍骨方今官帖中定為王右軍書唐人謂此本荀輿治勞方右軍臨之至今謂貍骨帖梁武帝常以古書雜迹二卷問於陶隱君對以貍骨方是子敬書亦似摹迹就二書所載考之廉瀝乃勞之謂外臺引蘇遊論云因虛損得名為勞極吳楚云琳瀝巴蜀云極勞按廉淋一聲廉瀝即淋瀝又巢源云尸疸病者嶺南中瘴氣土人連歷不差變成此病連歷乃綿連歷久之義正與淋瀝同蓋江左時用方言書唐人乃改作勞也閲千金等書古方多用貍骨治勞而後世用貓頭方藥池物理小識論之詳矣肺焦黃胖孔毅父談苑云賈山谷採石人石未焦肺肺焦多死陸儼山農田余話云作園士治蔬圃其人必病黃日與穢惡之氣相近蓋五藏之內脾香臭惡氣入脾以害脾也今斯邦人亦云石匠年老多發乾咳此以積年石末飛入腹裡傷臟所致醫不能療又云黃胖以常觸糞穢所發乃與二書之言符矣而醫書不言及者何諸魃記鬾之訛鬾音奇玉篇小兒鬼也故小兒繼病謂之鬾菊坡叢話云今小兒乳哺時值母有孕輒眉心青黃泄瀉此俗謂之記乃鬾之訛也巢源千金誤本或作魃故保嬰撮要云魃病又名鬾病夫魃者旱神也何干小兒之疾而萍洲可談云世傳婦人有産鬼形者不能執而殺之則去夜復歸就乳多瘁其母俗呼旱魃亦分男女女魃竊其家物以出男魃竊外物以歸豫按此亦鬾之訛遂呼為旱魃耳又書影云今中土大旱輒謠某婦産旱魃聚衆捽婦用水澆之名曰澆旱魃嗚呼魃之為魃遂令産婦受澆水之苦隻字之訛一至於此良可懼矣淡寮方載治小兒鬾方云音其即解顱也用錢氏鐵箍散局方安腎圓此説亦誤醫學啓蒙謂之魅病誤甚摹姑顏師古匡謬正俗云或問曰小兒羸疾謂之摹姑何也答曰此謂巫蠱爾轉為摹姑此病未即殞斃而惙惙不陰有似巫祝壓蠱之狀故祭酬出之或云漢武末年多所禁忌巫蠱之罪遂及貴戚故其遺言遍於三輔至今以為口實也胡侍真珠船云韻會摹姑小兒羸疾今云無辜聲之訛也方以智通雅云凡物頭員謂之孤都俗以愁苦尖喙曰孤都因以欒欒孤獨可憐之狀黃公紹曰小兒羸疾曰摹姑是也規模作規撫無有摸音則摹姑之聲亦從無辜來辜之為罪正謂其粗惡堪憐也豫考數説類似牽紐焉按諸書引玄中記無辜病為無辜女所病一名天帝少女一名女鳥一名姑草犬隹鳥鳥一名夜行遊女一名乳母鳥曰女曰姑曰母無辜之訛而摹姑亦為鳥名明矣又按蕪荑治小兒疳疾爾雅一名無姑無既有摹音摹姑即疳疾因意無姑之得名因治無姑之病猶百合之於百合病耶並録俟考痎吳處厚青箱雜記云蜀有痎市而間日一集如痎瘧之發則其俗又以冷熱發歇為市喻謝肇浙五雜組亦云西蜀之市謂之亥亥者痎也痎者瘧也言間日一作也吳注素問引方言書夜市謂之痎市與二書所言異按説文痎二日一發瘧也吳説恐是杜撰讓急就篇消渴歐逆咳悶讓顏師古注讓大便節蘊積而利也讓即聖惠方所謂襄利幼幼新書所謂釀瀉劉昉云釀者如酒之意皆疳積為病是也通雅以為五泄之大瘕泄誤鄭聲鄭聲重語也義未明晰田藝蘅留青日札云鄭聲淫今考鄭詩非淫鄭聲則淫淫者聲之過也猶雨之過者曰淫雨水之過者曰淫水故曰溢也左傳曰煩手淫聲慆堙心耳乃忘和平謂之鄭聲許慎五經通義云鄭重之音使人淫過也得之而義自見登豆瘡林恆齋良以云巢源登豆瘡登當是登字訛考字收登與碗同楊升庵引唐六典有登豆音彎即豌豆外臺引巢源曰其瘡形如豌豆亦名豌豆瘡可以證矣恆齋元祿中醫官博覽群籍著書數種豫藏其病名續録怪疴續抄並有益於學者社公續醫説引席上輔談云今人指發眉如雪而肌肉純白者以為社日受胎故男曰社公女曰社婆閲宋人衛生總微論不治病胎內十二症中有社老又書影云人之賦形有羊白星家金羊鬼宿次未冢宅偏感其氣則人羊白是乃此邦呼為白子者野雞外臺小兒野雞下部癢悶程衍道云野雞未詳按草木子云漢呂后諱雉改雉名野雞人患痔者名野雞疾因知本草拾遺蛇婆主治五野雞病即五痔爾而直指方云大便下血日久多食易飢腹不痛里不急名曰野雞又醫説云以大便艱難為野雞痔謂欲便而復止故也此則不幹呂后之諱別是痔中之一證臘梨白禿臘梨蓋臘梨者臘月之梨所謂凍梨也頭生白禿其狀類此故亦呼臘梨焉堅瓠集載臘梨賦云葫蘆之質油灰之色盔頭以擺錫為裝燈籠以梅花為式又有臘梨歌併為此瘡作耳外科奇救方作辣離醫法指南作瘌痢事物紺珠作喇哩皆因音而轉訛也狐臭胡侍真珠船云洪芻香譜金磾香洞冥記金曰磾入侍欲衣服香潔變胡虜之氣自合此香由是言之今謂腋氣為狐臭狐當作胡又壽域神方云胡者謂胡人之臭俗稱狐臭誤矣按肘後方人體及腋下如狐𤜢氣巢源亦作狐臭則不必改作胡也教坊記謂之慍羝崔氏海上方謂之鴉臭全幼心鑑謂之豬狗臭南史宋後廢帝記謂之蒜氣類書纂要謂之𤜢臭此皆不過以其臭之相似呼之而已悶臍生陳眉公聞見録云大原王相公始生冷無氣母驚謂已死有鄰嫗徐氏者反覆諦視良久笑曰此俗名臥胞生吾能治之當活活則當貴但不免多病纍阿母耳趣使治之其法用左手掬兒右手摑其背百餘逾時嚏下而醒又周亮工書影云今北方難産者落無聲若熟寐然以火氣熏接其臍或從旁擊竟以引其聲始能寤謂之草寐十隻有一二生全按育嬰家祕云兒才生下即氣絶不啼哭俗名悶臍生即寤生也必是難産或冒寒所致物理小識作悶寂生胤産全書謂之夢生匯聚單方謂之夢胎推拿祕法謂之草迷並同癇王符潛夫論云嬰兒常病傷飽也父母常失在不能已於媚子哺乳太多則必掣縱而生癇徐嗣伯曰大人曰癲小兒曰癇巢源云癇者小兒病也十歲已上為癲十歲已下為癇此癇即宋以後所謂驚風也始見聖惠而大人之病亦可稱癇隋許智藏診秦孝王俊曰疾已入心即當發癇不可救也見隋書本傳時孝王已為大人又外臺大人方中有癇門可以見耳𥍃炮炙論序目闢眼𥍃𥍃字無考容齋隨筆引作目雍亦未詳其義何鎮本草必讀作眼矔注云矔音貫張目視及轉目視也張目視與轉目視豈是病目豫按𥍃疑是睢之訛病源候論有目睢候其皮緩縱垂覆於目則不能開世呼為睢目漢書注睢仰視貌蓋皮垂覆則不得不仰視故謂之目睢疒貢黴瘡祕録有或疒貢爪甲語又萬氏家抄瘡名蟺疒貢頭本草匯言有軟疒貢瘡疒貢字檢字書無考但品字箋為首上毒瘡而其義未允當原病集釋音疒攻音貢瘡疾疒攻臖知是與疒攻同腫起之義小兒袖珍方㿉字亦同文字從疒醫書文字溫疫之為瘟疫水腫之為㽷瘇鼓脹之為脹消渴之為痟暍勞瘵之為癆瘵霍亂之為癨亂歷節之為癧癤哮嗽之為痚嗽眩暈之為痃疸鼠漏之為癙瘻痄腮之為痄𤸛便毒之為疒便毒發背之為發疒背辣離之為疒辣疒離休息痢之為㾋瘜痢凡此類強從疒者郭忠恕所謂飛禽即須安鳥水族便應著魚正是此之謂也護項人之惹風必自風府項間颯然噴嚏隨出次之以惡寒發熱寒日宜護而避之資生經云岐伯對黃帝之問曰巨陽者諸陽之屬也其脈連於風府故為諸陽主氣也然則風府者固傷寒所自起也北人皆以毛裹之南人怯弱者亦以帛護其項俗謂三角是也豫少怯弱春冬須數次感風自用物護後無此患矣凡怯弱者須護項後可也針灸聚英云北人以毛皮裹之今之護風領南人怯弱者亦以帛護其領今護領乃云蔽垢膩實存名亡矣又朱輔溪蠻叢笑云朱漆牛皮以護頭項名固項蓋固項即護領不止北人為然按道書以腦後為風窩亦由此賊風醫壘元戎俗云賊風者窗牖之風非也豫按以窗牖之風解經之賊風固非也然此攝生家之所最可避也嘗閲明陳龍正幾亭外書云孔隙風名為賊風何也曰平面風如開口之呵簷下風如嘬口之吹呵溫而吹冷吹已不可不避況孔隙風乎鐵之為物方圓平厚可坐可憑惟刀錐不可近薄與尖故縫風如刀隙風如錐可謂能近取譬矣露首溫足豫夜寢必覆被沒頭否則不能穩睡數十年以為常矣內典云欲得老壽當溫足露首又應璩詩下叟前致詞云暮眠不覆首嘗日中坐地讀書見頭上有影二三尺蒸蒸如遊絲蓋陽氣之從玄府上騰也方知露首所以得壽而下叟之言不偶然然不能頓止羹上肥瞥瞥如羹上肥世人多不解井金峨先生嘗謂豫云瞥瞥財見難認之義肥謂肉之脂液浮乎羹面者凡羹中有肉則其面有小輪無數光彩不定瞥瞥然相逐此即肥也後豫得數證以質先生稱善後漢郡國志引博物記記石腦油云其水有肥如煮肉洎羕羕永永如不凝膏脈經圖説曰羹上肥猶肥珠在於羹面病源候論有肥目候云似羹上脂致令目暗外臺載範汪五淋方云氣淋者下如羹上肥劑頸劑頸而還無明解按劑劑限之義而還猶謂以還言劑限頸以還而頭汗出也脈經有劑腰而還之文又尸子云莒國有名蕉原者廣尋長五十步臨百仞之溪莒國莫敢近也有以勇見莒子者獨卻行劑踵焉此所以服莒國也劑頸劑腰劑踵皆限劑之義耳消息傷寒直格云消息謂損益多少也錦城大田公幹元貞嘗謂云公羊昭十九年曰樂正子春之視疾也復加一飯則脫然愈復損一飯則脫然愈復加一衣則脫然愈復損一衣則脫然愈何休注脫然疾除貌也言消息得其節傷寒論消息二字得之而義自明此説得之索餅來元成倘湖樵書云今俗以麥面之綿索而長者曰面其團塊而匾者曰餅考之古人則皆餅也劉禹錫贈進士張盥詩曰憶爾懸弧弓余為座上賓舉箸食湯餅祝辭添麒麟湯餅而舉箸食之馬永卿雲即世之長命面此唐人以面為餅之一證也漢張仲景傷寒論云食以索餅餅而云索乃面耳此漢人以面為餅之一證也豫按龐安時總病論煮餅是切面條湯煮水淘過熱湯漬食之即索餅也方有執改作素餅誤千金作痎餅黃龍湯仲景之方配四獸曰白虎曰青龍曰玄武曰朱雀十棗湯一名朱雀湯見外臺澼飲門先友山田宗俊正珍著傷寒考詳論之而丹鉛總録云余嘗疑天有五行星有五緯地有五嶽人有五事而二十八宿何獨無中央之宿也後觀石氏星經云中宮黃帝其精黃龍為軒轅又按張衡靈憲軒轅黃龍於中則是軒轅一星與蒼龍白虎朱雀玄武四獸為五矣余於是謂方已取名於四獸則必有配中宮一星者後讀千金方勞復篇小柴胡湯名黃龍湯乃並四方以應五獸焉此當補傷寒考震氣菽園雜記云凡空屋久閉者不宜輒入先以香物及蒼朮之類焚之俟鬱氣發散然後可入不然感之成病久閉眢井窨窖尤宜慎之徹醫徐德夫寓京日家人方春入花窖窖深久不起疑之又使一人入焉亦久不起燃炬照之二人皆死其中蓋郁毒中之也按輟耕録枯井有毒一則與此事相類又熊三拔太西水法載避震氣説云地中之脈條理相通有氣伏行焉強而密理中人者九竅俱塞迷悶而死凡山鄉高亢之地多有之澤國鮮焉此地震之所由也故曰震氣凡鑿井遇此覺有氣颯颯侵人急起避之俟泄盡更下鑿之欲候知氣盡者縋燈火下視之火不滅是氣盡也今東都造麴家窖中時或有發氣燭必滅以蒼朮一塊障火則不滅至其甚人中之而死救療之法具於先考所輯濟急方砒毒秋燈叢話載萊郡劉某遇僧授海上方多效其解砒毒尤為神驗戚某屢求不與銜之乃置酒延劉食畢扃其戶謂曰爾已中砒毒矣速語我方為爾療劉不信頃覺腹中漬動乃曰何惡作劇如是可疾取白礬三錢來戚如言取至調水飲之立解因惡其吝也榜其方於通衢享和中東都木挽街有醫西良庵制截瘧丸子入砒者盛囊攜出而行醫百餘里外數十日後歸家搬移之際丸子滾轉雜於煙中西不知之一日解裝出煙飲之忽覺口中異常妻及兒子亦飲之復然少選三人心腹大痛苦楚不可名因開煙檢之見有丸子大駭急服解毒藥數種並無寸效遽呼鄰家仙台醫官永井元庵而議之元庵無計可出偶記叢話用白礬事如法用之三人便云藥下胸頓覺心腹一道開豁矣竟得救三人之命豫親聞之永井氏實神驗方也時輯救急選方因收其方嗚呼為醫者小説雜記亦安可不寓目哉八月生子董含蓴鄉贅筆載俗傳七月生子生八月生子死西鄰有朱氏妻八月産一子妾七月産一子妾産者周歲而殤妻所生至今無恙醫書以胎成七月屬太陰脾經脈內屬於肺土能生金故壽八月屬手陽明脈內屬於大腸生氣交於泄氣故夭此論似不足執以為據也按張志聰注素問六元正紀云七月所生小兒能育而亦多長壽者蓋七月乃肺藏司養肺屬天而主氣主血天一生水感天地之氣而生故育九月十月乃少陰太陽所主皆感陰陽水火而生若夫八月乃陽明大腸主氣感陽明之府氣而生故雖生而不育董氏所引醫書未有所考與隱菴之言少異要之此説不足信據然世人多知之故録此古方古方二字唐人有於詩中用之者如盧綸寂寞日長誰問疾料君惟取古方尋又雍陶新句有時愁里得古方無效病來拋是也天下皆知學古方書矣見宋陳振孫書録解題外臺祕要部復古李東陽云豫恆病天下之藝未復於古而醫為甚今如斯邦則不然天下之藝無不復於古而醫為甚昔者病其不復於古而今則病其復於古何居其以為古者非所謂古也先師井金峨先生嘗謂曰自伊物二公首倡復古海內靡然響風雖小道亦必效之遂有廢陰陽排五行去素靈諸家直講張仲景書者動輒云是非仲景之語也夫素靈固出於後人而漢儒之學原於陰陽五行仲景生於其後焉知今所謂古學者乎故有陰陽五行之説無害其為仲景也謂之仲景之誤則可謂之後人攙入則不可且易説陰陽書載五行六氣見於下氏豈與先天后天理氣體用無稽之言同乎唯其於治病無所當則置而不言固其所已至其謂之復古則既無徵於前後何所復之有此可以砭近來醫流之謬也藥劑茅元儀野航史話云余嘗怪岐黃家制方必窮析分釐而置劑者每以手為度必不能合欲以已疾焉得不疏古之名醫止華他置劑心識分銖不假稱量他能剖腹破背湔洗腸胃此可仿效乎斯邦醫家亦坐於此弊然數十人數百裹之藥每藥必較量錢分殆不勝煩瑣是不得已之勢也診腹臨病必診按其腹詳見於四十九難揚玄操丁德用注此醫家四診之外不可缺之事也但歷代醫書未見有詳論者張志聰傷寒論集注云中胃按之而痛世醫便謂有食夫胃為水穀之海又為倉廩之官胃果有食按必不痛試將飽食之人按之痛否惟邪氣內結正氣不能從膈出入按之則痛又胃無穀神藏氣虛而外浮按之亦痛若不審邪正虛實概謂有食傷人必多又按者輕虛平按若按不得法加以手力未有不痛者此才挽近診腹之一證也而近聞吳中醫士寓於崎岙者獨診脈而不及腹豫心訝之甲子冬使譯官問之於蘇門胡振振覆曰唐山診治但有按脈而無按腹之説況古來亦並無此法然亦有之或患腫脹腹滿之症者視其腹之形色按其腹之堅軟耳再或幼科童稚未免傷於食者故亦按之其他癥瘕痞塊病人自能詳述亦毋庸按之也蓋此彼邦近代之弊習為然振不考諸古今醫書漫為之答亦何陋也靨字音痘瘡收靨結靨世醫或為掩音或為叶音未詳何是嘗閲林恆齋良以劄記定為掩音曰痘靨或作痘黶又作痘阜全幼心鑑痂疕瘡黶醫學綱目瘡阜曰痂是也又通作厴見本草敗茅條合諸説考之原是大學厭然之厭康成注厭讀為黶陸音烏簞反痂有閉藏之意黶之為痂乃本於此豫按準繩云痘瘡收靨圓淨堅厚如螺靨者上也品字箋瘡痂俗曰瘡䗐正字通瘡弇瘡痂也螺厴草養疴漫筆作螺掩草時珍海螺釋名厴音掩閉藏貌乃知黶靨䗐弇通用而音掩皆可以證恆齋之説矣又王氏易簡方作收擫擫於琰切音黶要之會意假借展轉不一如此又楊氏家藏方攤膏藥於紙花謂之藥靨靨字之義亦可見也福醫藥案龔氏回春載南方人有患病者每延醫至診視後止索一方令人構藥於市正聞彼土風俗今猶為然天明壬寅歲浪華舶商十數人飄泛到福州地留月餘其內一人染時疾縣司差醫日就客館診醫不自調藥唯疏其方而去衙卒乃攜方案買之藥鋪而其煎藥將鐵蕉十餘本搕根收土投諸水中攪澄用之曰鐵蕉從日本所載來株猶帶其地土今用此水猶用其土水必無不服水土之患也蓋其用心切矣豫向得其藥案二紙廁箋縱九寸橫五寸字廁行草其一曰治郎初一日洋參五分麥門一錢去心川石斛二錢新會皮三錢穀芽一錢炒生苡仁二錢雲苓一錢甘草一錢加東洋土覺水澄清代水煎錫餳金華戴元禮國初名醫嘗被召至南京見一醫家迎求溢戶酬應不間元禮意必深於術者注目焉按方發劑皆無他異退而怪之日往觀焉偶一人求藥者既去追而告之曰臨煎時下餳一塊麾之去元禮始大異之念無以錫入煎劑法特叩之答曰是古方爾元禮求得其書乃蜴耳嗚呼不辨餳錫而醫者世胡可以弗謹哉見於陸深金臺紀聞豫弱冠有偶成詩云國手喧喧孰是真俱言寸圭能回春由來錫餳無辨得委命求生世上人乃用此事近清人説部載有宦醫以敗醬為陳年食醬用之病人病轉劇者事太相類左右齊診魯華祝衛藏圖識云西藏醫名厄木氣其視脈以左手執病者之右手右手執病者之左手一時齊診豫向得本邦古醫書一卷其中載診脈法云左右齊診而脈動應於醫之手左右動數不齊者死之兆也此從前脈書所未言及焉文人叵信豫前年得汪伯玉大函集觀其傳世醫吳橋文辭遒上全擬太史公而其治驗三十餘則莫不神且奇焉以為倉公之儔也常欲得其遺書而讀之頃者偶閲詹景鳳明辨類函曰歙岩鎮吳氏醫本未精通而以奔兢得鄉薦紳薦引出入郡縣公遂起巨富豫嘗同其視一姻家內人病日未時切脈曰無病偶感風寒爾一劑可療至酉時復切脈曰病減矣及戌時而婦死死尚不知可謂醫乎汪司馬公伯玉往來主於其家遂為作傳以比太倉公豫於是始知其醫之庸劣而文人之叵信也草藥本草有解草藥毒方張景醫説蕭京救正編並載草藥不可服之戒蓋草草粗之義非草木之草外科精要云或用君臣藥或用草藥其疾益甚體仁彙編云平日有舊病腹中有草藥又服君臣藥者不治已任編云浙西人言出自醫家藥籠中者謂之宦料藥俗傳單方一二味謂之草頭藥婦女酷信此説不讀書者從而和之往往以此誤事引線候脈世傳翠竹翁引絲診脈此醫書所未言襄陽縣志載崔真人名孟傳北水關人從族兄授醫學掃云留月直為壺公妙術萬曆朝太后病篤真人應召詔自簾孔引線候脈投劑立愈上賜官賜金皆不受遂賜以真人號後於武當羽化自號撲庵此恐因小説西遊記孫悟空之事傅會者一貼藥一貼始見金匱柴胡飲子方後或通作帖蓋是包裹黏貼之義陳眉公太平清話云宋朝吳郡士登科者始於龔誠其家居崑山黃姑廟猶藏登第時金花榜帖乃塗金紙闊三寸長四寸許大書姓名下有兩知舉花押又用白紙作大帖如藥帖狀貯金花帖於中外亦書姓名二字蓋以此報其人以此知其制與斯邦藥裹倣佛相似也食物亦有稱帖元李材解酲語云尚書範谷英賜食帝前食菲芽面旨之一箸而止帝曰不中食乎英曰臣豈敢但天廚珍味臣已領恩矣山妻久厭糟粕將以遺之使知官家有人所不見之物也帝令盡食之復賜一帖以歸又徐氏筆精墨一笏筆一帖一周今俗病之劇愈藥之驗否皆預期以七日謂之一周按郎仁寶七修類稿云天之所以為天不過二氣五行化生萬物名曰七政人之所以為生亦不過陰陽五常之氣行於六脈見之名曰七情天之道惟七而氣至六日有餘氣盈朔虛推算時刻則為一候故天道七日來復人身之氣惟七六日而行十二經一日行兩經有餘故人之疾至七日而輕重判焉高緩小説載醫緩姓高初疑其出何書又神仙通鑑扁鵲自稱高緩後長桑謂之曰即以高人自許更濟以謙和始可免禍我即以高和名之後閲鄭夾漈通志醫緩即醫和聲之訛小説戲文非無所由若夫張松北見曹操以其川中醫有仲景為誇則無所考而方中行引以為證者何諸艾師楊鐵崖贈艾師黃中子古樂府云艾師艾師古中黃肘有補注明堂方籠有岐伯神針之海草岐伯遺針於海島岸生艾草他艾十不及一篋有軒轅之燧光灼艾禁木火火鏡火珠取火佳針窠數穴能起死一百七十銅人孔竅徒紛龐華他針灸不過數處三椎之下穴一雙二豎據穴名膏肓百醫精兵攻不得火攻一策立受降金湯之固正搗穴快矢急落如飛鶬梅花道人鐵石腸昨日二豎猶強梁明朝道人步食強風雨晦明知陰陽老師藥券不受償何以報之心空藏施藥勝施羊公漿會有仙人報汝玉子成斗量按艾師又呼灸師夷堅甲志云汝前世為灸師誤灸損人眼是也乃以灼艾為業者今斯邦多有焉果子藥豫每觀世啞科療病至虛不多用參附之屬至盛不多用消黃之輩特主平穩之劑至其危殆不敢自省然而以此馳名致富者頗多不特斯邦嘗閲明江邦申歲寒社耳目日書云小兒醫痘杭城首推某矣某用藥極平易簡少俗所謂果子藥然渠所謂吉凶分數約日不差人以此服之豫曰此自其眼力高耳胸中定耳渠知痘無藥也順不必服逆庸服險症亦只須果子藥可保無後怨倉公傳云秦越人非能生人人自當生者秦越人能使之不死耳此又可為一不必服藥之明徵矣矢醫徐東莊醫貫評云熱既入里離表已遠驅出為難故就大便通泄其熱從其近也得汗而經熱從其解非汗為害而欲祛之也便矢而府熱從矢出非矢為難而欲攻之也醫不察此專與糟粕為敵自始至終但知消克瀉下之法求一便矢以畢其能事夭人生命如是者曰矢醫近來斯邦矢醫極多可嘆矣衣上出火張芳洲雜言云景泰中晨出暮歸抵家天色盡瞑入室更衣遂解下裳暗中有火星星自裙帶中出轉摺至揓上晶熒流落凡三四見荊婦相顧失色不敢言忽憶張茂先積油致火之説而余所為裳乃吳綾俗所謂油段子工家又多以脂發光潤況余被酒體氣蒸郁或因以致火亟呼婢令於揓後力曳裳以手摩之及手熱幾不可忍火星星至矣以此知事物異常者必有所自不可遽為驚駭傳惑人也此他稗官諸書間載此事方藥地物理小識云青布衣大江西洋布及人身之衣氣盛者皆能出火豫先考藍溪公所識一貴婦每暗中更衣火星爆出因謂婦女櫛發於暗中及描兒背毛逆摩俱出火之類蓋體氣盛者偶有搏擊而發光者非真火也近西洋所齎來一器其制匣大尺余一人熱線一人轉捩少選執線人體上火星星出迸炸有聲意亦此理也同身寸俞穴分寸滑氏以降以骨度取之王太僕所謂同身寸者未知何寸徐春甫遂有同指寸之説肘後方取巨闕法云以赤度之赤尺古通下經曰岐伯以八分為一寸亦未知何尺考晉書裴頠傳云今尺長於古尺幾於半寸樂府用之律呂不合史官用之曆象失占醫署用之孔穴乖錯此三者度量之所由得失之所取徵皆絓閡而不得通此乃似用常尺要之無論古人所用即肥瘦修短隨取而隨而無差者莫若骨度焉此乃千古不刊之活法也近重表弟山崎子政譱創制骨度折量尺十二條不啻用心之苦捷便未有過於此者焉針下胎針術之妙李洞玄於長孫皇后屠光遠於番易酒官之妻龐安時於桐城民家之婦凌漢章於吳江貴家之婦張公壽於松江一婦出都公談纂高郵一醫於寠人妻出讀律佩觿又滑壽紹興府志焦蘊穩海州志丁毅江寧府志殷矩儀真縣志之於臨産婦人或云兒執母心或云兒手挂母腸皆隔腹針兒手胎下而視兒掌有針痕夫兒居母腹中在胞內焉此決理之所無而傳紀載之實可疑矣針不出齊東野語云趙信公在維揚制閫日有老張總管者北人也精於用針其徒某得其粗焉一日信公侍姬苦脾血疾垂殆時張老留傍郡亟呼其徒治之某曰此疾已殆僅有一穴或有療於是刺足外踝二寸徐而針為血氣所留竟不可出其徒倉惶請罪曰穴雖中而針不出此非吾師不可請急召之於是命流星馬宵征凡一晝夜而張至笑曰穴良是但未得吾出針法耳遂別於手腕之交刺之針甫入而外踝之針躍而出焉即日疾愈又新安文獻志云程約字孟博婺源人世工醫約精針法同邑馬荀仲自許齊名約不許也太守掌爰嘗有疾馬為左脅下針之半入而針折馬失色曰是非程孟博不可約至乃為右脅下一針須臾而折針出疾亦隨愈由是優劣始定焉今醫家遇針不出乃針他穴道正與張程之術符矣八脈名義衝脈起於氣衝陽維陰維者維絡於身難經既論之但餘四脈未詳其義楊玄操云督之為言都也任者妊也此是人之生養之本故曰位中極之下長強之上豫切疑任者妊也在女子則可至男子則窮矣因考四脈皆取義於衣物耳督敄牛也又作裻其脈行脊中行猶衣敄牛之在於背後申生偏衣國語作衣之偏裻之衣韋昭注裻在中左右異故曰偏史趙世家王夢衣偏裻之衣正義按裻衣背縫也莊子養生主緣督以為經釋文引李注云督中也趙注奇經八脈中脈為督衣當中之縫亦謂之督見禮記深衣注是也督已為衣當中之縫任則為衽之義其脈行腹中行猶衣衽之在於腹前也而帶脈以總束諸脈猶帶之繞腰也蹻草履也史記虞卿躡蹻擔簦二蹻脈共起於跟中故取名焉蹻音吉約切滑氏音丘妖切云是取蹻捷超越之義恐非也脫文校補濟世拔萃載遺山阿魏散治骨蒸傳尸等勞寒熱羸劣困倦喘嗽上阿魏三錢研青蒿一握細切東北桃枝一握細銼病人中指許大男左女右以童子小便二升半隔夜浸藥明旦煎取一大升空心溫服分為三服進次服檳榔末三錢如人行十里更一服服至一二劑即吐出蟲子或泄瀉更不須服余藥若未吐利即當盡服病在上即吐在下即利皆出蟲如馬尾人發即差萬金良藥可以當之豫當欲試用此方然所缺三字未知何字亦無他本可校因姑置之後偶閲王漁洋居易録引元遺山續夷堅志載此方所缺乃甘草如三字遂得補完之但此藥如斯邦人不堪臭因改為丸子用之頗有效驗噫此三字不得之方書中而校補不量於説部而得之者抑亦奇矣醫焉可不涉獵群籍乎紙鳶放鴿續博物志云今之紙鳶引絲而上令兒張口望視以泄內熱香祖筆記引張合宙載云張鐸僉事言鴿能闢小兒疳氣當多房養之清暑令兒開房故其氣著面則無疳氣邦俗云病瘵人可弄烏貓患風人宜乎觀鶩必有所由瘡毒發痢王世懋二酉委談云豫歷藩臬於寮寀間見異症因録以俟知醫者秦方伯淦右轄楚中時背脅間生一痰核漸大如瘤聞荊南有善醫者須服藥滿百帖始除即少弗效也如數服之果愈遷為豫章左至時了無恙亡何足微蹇問之云足面似簇筋令童子捫之傷皮耳已遂愈數日而病痢提學江公以東私謂同寮曰大夫其非痢之謂疾殆不起乎余怪而問之曰余非知醫者也先大夫先患足瘡一如秦公已而下痢竟不治蓋瘡毒所發也秦公乃竟死一閩參政王公懋德自延平歸忽瘦甚鬚髮皆枯云是消渴證百方藥之弗效先是延平一鄉官潛謂人曰王公病曾有嘗其溺否有此患者溺甚甜此不治驗也王后聞之初試微甘已而漸濃愈益甜王亦自知必不起云消渴病聞之溺甜則未之前聞也豈亦糞甜苦之類乎二事皆醫説所未載豫前年視一士人妻歲五十餘云常穿玄𧍒線一日於指節間針尾所觸生小瘡狀如瘊子後漸腫起延及臂肘發紅紫暈不堪痛楚日夜號呼瘍醫祝藥數日而愈尋患痢日數十行所下如爛魚腸百方無效時豫偶記麟洲所筆心斷其必死後果然至渴疾嘗尿則見外臺祕要而許學士本事亦有説麟洲儒者或未及檢爾嘗糞甜苦見吳越春秋縊死用藥明史嘉靖二十年宮婢楊金英等謀逆以帛縊帝氣已絶太醫院使許紳急調峻劑下之辰時下藥未時忽作聲去紫血數升遂能言又數劑而愈考焦竑獻徵録所用桃仁紅花大黃諸下血藥也雙睛突出王遠奇疾方載九江有夫毆其婦致雙睛突出邊有兵過其門令勿動取手巾水濕盛睛旋轉使其系不亂然後納入即以濕巾裹住令三日勿開其婦性急閉二日遂解巾眼好如故但遇風寒常發痛云解早之故也豫嘗見一朴漢角力之際左眼睛突出大如雞蛋垂下尺余初不覺痛一人多唾手掬而納之須臾半面腫起痛劇甚急請眼醫點尉十餘日復故但顧盼之際烏睛不轉為異耳又聞有力掀鼻涕目睛突出者亦不可不知疥蟲草木子疥有蟲使明者針而取之其大不以半粟也膚革完全乃因人氣血不和而化生者鈕玉樵觚剩云曹溪金盂常短視離物寸許即摸捫不辨近則能察毫末年逾七十餘猶然見人有疥也輒為搜取其疥內蟲云疥蟲有雌雄雄者頷下有須種種然可數亦有老少少者色白但其口稍黑耳鵝血治噎鵝血治噎膈於方書所未見特張路玉醫通載王御九仲君中翰金淳還公即太史韓慕廬東坦咸賴此霍然按王漁洋香祖筆記鈕玉樵觚剩並云武昌獻花寺僧自究病噎死遺言其徒剖之胸腹果得一骨如簪取置經案久相傳示後有戎師寓寺從者殺鵝未斷其喉偶見此骨取以挑刺鵝血憤發而骨遂消滅自究之徒亦病噎因悟鵝血可治數飲遂愈以此方授人無不驗者鵝血治噎昉見於此與廣五行記所載靛治噎疾事正相類王漁洋晚年著古夫於亭雜録云鵝血治噎試之亦不甚效蓋噎有五種未知何噎必有所主對也暍瘩吳震芳談往載崇禎十六年八月至十月京城內外病稱暍瘩貴賤長幼呼病即亡不留片刻兵料曹良直古遺正與客容對談舉茶打恭不起而殞兵部朱希萊念祖拜客急回入室而殂宜興吳彥升授溫州通判方欲登舟一價先亡一價為之買棺久之不歸已卒於棺木店有同寓友鮑姓者勸吳移寓鮑負行去旋入新遷吳略後至見鮑已殂於屋吳又移出明辰亦殂又金吾錢普民同客會飲言未絶而亡少停夫人婢僕輩一刻間殂十五人又兩客坐馬而行後先敘話後人再問前人已殞於馬鞍手猶揚鞭奮起又一民家合門俱殂其室多藏偷兒兩人一俯於屋簷一入房中將衣飾疊包遞上在簷之手包積於屋已纍纍下賊擎一包托起上則俯接引之上者死下者亦死手各執包以相縴又一長班方煎銀蹲下不起而死又一新婚家合巹坐帳久不出啓幃視之已殞於床之兩頭沿街小戶收掩十之五六凡楔杆之下更甚街坊間的兒為之絶影有棺無棺九門計數已二十餘萬大內亦然天師張真人輯瑞入都出春明不久急追再入諭其施符噴咒唪經清解眠宿禁中一月而死亡不減發內帑四千三千買棺一千理藥竟不給十月初有閩人補選縣佐者曉解病由看膝灣後有筋腫起紫色無救紅則速刺出血可無患來就看者日以萬計後霜雪漸繁勢亦漸殺閩醫以京銜雜職酬之明春為流賊所賊豫按所謂暍瘩即痧病也王庭痧脹玉衡序云憶昔癸未秋余在燕都其時疫病大作患者胸腹稍滿生白毛如羊日死人數千竟不知所名有海昌明經李君見之曰此痧也挑之以針血出病隨手愈於是城中舁而就醫者亦日以千計皆得愈而去祟禎十六年歲在癸未正與談往之言符矣此明年闖賊陷燕京明亡豫謂此不必病亦妖孽耳針入肉中針誤入肉若不即出經年纍月走趨肉中必出從他處豫亦往往目擊焉袁漫恬書隱叢説云鄂州武氏女得奇疾痛時宛轉不堪一道人以藥傅之一鐵針隔皮跳出余侄家幼婢寤寐中手面腕間如蟲螫之痛若有物入於中自後蠕蠕微痛漸漸緣臂灣環而上直至肝背忽露一細頭以指擲之乃是一無孔鐵針其痛始愈計其三月之久矣夫針之偶入膚肉亦常耳獨異其宛轉而上且能自穴而出視武氏女又異矣昔人之所謂蜿蜒如龍者安知非此等耶以是知事理之不可測而物性之不可知也辟穀丹甲辰初冬豫於舊書肆中見古本脈經乃購歸而檢之乃熙寧三年宮刊小字原本也會篁墩吉資坦安見過二人反覆展覽之際忽獲夾紙一幅疏辟穀丹方甚詳不知何人書小行草如發資坦曰此書態度清逸在於董玄宰陳仲醇伯仲之間此宜寶借焉未知試之於今驗否如何而其方甚奇姑録於此曰此方圓者服之終歲無飢寒之迫病者服之七日有回生之功更宜修真著行之侶為入山了道之助夙緣祕授妄泄遭愆凡修制須用黃道天德吉日忌孝服婦人雞犬見之砂里汞七釐半明硃砂一分七釐半乳香一分五釐茯神五分茯苓五分木香二分飛管仲七分蕨粉二錢八分龍骨五分黃丹飛過二分五釐雄黃二分黃蠟三錢松香三分冰片一分五釐上好者白朮五分大金箔十五張存二張為衣金箔汞丹雄五味細藥另配研極細不見星片又另細研餘八味共末候松香黃蠟溶化先入攪勻次下細藥速攪隨提離火下片搗千餘下搗一下念一聲救苦觀世音菩薩如凝硬焙軟再搗分作六丸金箔衣之磁合陰乾仍蠟固為丸服此先淡齋數日臨時食白水淡面一飽然後用乳香湯乘熱送下一丸入室靜養扞心減言不得勞動如覺微飢進梨汁三五口或井花水一小杯七日外方可行走説話時常冷水不忌或一月一季以至半年一年並不飢餓身體轉健精神倍長要飲食服青菜湯一碗原藥餌下稀粥補之兼用棗湯梨汁獨參湯更好七日內忌鹽醬酸辛以後不忌矣服藥咒曰這靈丹不可言名山洞府聚神仙遺在世內常救苦保國安家性命全吾奉太上老君急急如律令種痘醫通云邇年有種痘之説始自江左達於燕齊近則遍行南北詳究其源云自玄女降乩之方金鑑云古有種痘一法起自江右達於京畿究其所云源云自宋真宗時峨眉山有神人出為丞相王旦之子種痘而愈遂傳於世弋陽縣志云黃旻曙五十三郡人徐成吉五十五郡人得十全神痘法以棉絮取痘漿之佳者送人鼻內及愈有瘢如真往往靈驗遠近皆聞其風焉方象瑛種痘小引云江楚間多種神痘相傳昔有道士憫痘症殺人禮峨眉山四千九日夢授某童子仙苗翌日痘出李仁山蘇州人享保中來寓於崎館云種痘之法出自神授前有徽商施姓者泛海至一山遇天后顯靈授以此法按種痘之源諸説渺茫如此蓋其起自明季無疑矣聞斯邦房州濱海一村有自數百年前行種痘法多用乾苗乃先於彼土而知用此亦奇矣夫痘之順逆繫於受毒之輕重不由種與不種然不種而逆人必委之於天種而逆必恨種者不若任其自然也有人問痘可種否者豫則常以此為答五雲子名醫五雲子名寧宇系出於太原王氏慶安中投歸住於東都就學醫者衆萬治三年庚子四月十六日卒墓在三田小山大乘寺後門人數輩列於醫官於是一派相傳盛於今焉張膏字甘子號提山朝鮮之役屬袁了凡從軍為我兵所俘張善眼醫后豐公遣歸之贊州渡邊氏得其術行眼醫子孫相傳於今又孟二寬武林人朝鮮之役為我軍所俘業醫改姓名稱武林次庵明歷三年死其孫唯七為赤穗侯臣殉節卜齋板阪卜齋手鈔針灸聚英四卷有那波道圓及陳元贇跋皆真迹卷末有淺草文庫印記卜齋名如春世為名醫好畜書居於淺草寺之北明曆元年十一月卒墓在竹門醫王院林學士信篤銘豫近購此書於一書鋪因其六世孫宗悅來乞之懇篤遂與之以歸於其家今記陳氏跋曰嘗觀人之生也以水土水土之失宜則疾病因焉古之聖人既創草木之劑調之矣然又以為草木效遲不若金火之功速也此針灸之書所繇作也茲有針灸節要二書流傳於世久矣儒醫板阪卜齋翁重録而正之以珍其傳焉倘亦以金火襄水土之不及而起千百世之疲癃者乎不佞遇過齋頭披閲而有得於心遂濡筆於下以旌吾翁力古之功明崇禎戊寅孟秋中浣十九日虎林元贇謹題按崇禎戊寅者本邦寬永十五年也俞璉書先考藍溪公藏嘉靖中太醫院俞璉送日域金持重公序一幅云重公好為醫方東國之豪傑也凡三百餘言書法似松雪數十年前偶為人借失今歸於不知何人懊惜之至不可弭忘聊記於此瞽醫谷友信字文卿號藍水三藏失明受針醫術於祖考玉池先生而善賦詩記憶書傳講唐明諸家之詩殆解人頤名聲漸盛王侯大人競邀侍焉中年棄針移於內醫記藥方三百有餘行道之際口必誦之豫嘗造其廬坐有抽屜箱子其內實小紙袋貯藥二百許謂余曰僕用桂必選東京上好者請試焉伸手引屜直取出小袋中物示之其為無異明目人或以為依小袋次第記之竊亂抽其一問或摸或嗅而言其藥曾無一差人殫驚異以是其技亦稍行權貴間遂有仕進之志不果而歿夫瞽而為醫於四診中不得不缺望之一診矣而王元美有太醫盲者邵君像贊又長洲志載張頤以瞽人治病能豫刻年月決人生死有名吳中此蓋曠古無比顧文卿亦奇人必察之有方世上自多明目之人後來瞽者脫欲繼其踵我恐增地下人知時捷法北山醫話載鼻息知時一則豫嘗得知十二時捷法其法先用絲線長尺余穿錢孔纏結雙指舉線末持之錢下垂尺許下承以甌若盂屬勿令錢至底勿令手動搖如此須臾錢稍稍活起左右搖蕩觸邊作聲若辰時則作聲五次而止巳時則四次余皆如此但兩時中間則僅一聲妙不可言倉猝之際可以代自鳴鐘或謂指端有脈動而應之此理不可曉者虎咬明和中朝鮮有虎患對州戍卒夜巡者忽遇一虎直操槍刺之虎怒號臨死齧斷其脛肉急召國醫請治醫詣先以新汲水澆灌傷處數十回冷極矣因活剖雞腹乘熱窨傷處隨冷隨換殺雞者數十隻傷處漸墳起而焮熱乃以膏藥傅其上內用敗毒散加一味雄黃服之凡旬余而愈此法又可治瘛狗咬傷州人雛河某嘗為豫談未知方書有載之者否蒙汗藥本草載解蒙汗毒方未知蒙汗何物十便良方引雞峰方云解中毒蒙翰昏悶不省蓋蒙翰即蒙汗郎仁寶七修類稿云小説家嘗言蒙汗藥人食之昏騰麻死後復有藥解活豫則以為妄也昨讀周草窗癸辛雜志云回回國有藥名押不盧者土人採之每以少許磨酒飲人則通身麻痹而死至三日少以別藥投之即活御藥院中亦儲之以備不虞又齊東野語亦載草烏末同一草食之即死三日後亦活也又桂海虞衡志載曼陀羅花盜採花為末置人飲食中即皆醉也據是則蒙汗藥非妄豫按明梅元實藥性會元云羊躑躅花不可服誤則令人顫抖昏倒一晝如用可拌燒酒蒸三次即無慮矣同它羅花川烏草烏合末即蒙汗藥又王翊萬全備急方蒙汗俗名麻汗又清張介石資蒙醫徑銛骨門載蒙汗藥一名鐵布衫少服則止痛多服則蒙汗其方鬧陽花川烏草烏瓦龍子自然銅乳沒熊膽硃砂麝香凡九味上為絶細末作一服用熱酒調服乘飲一醉不片時渾身麻痹得數説而始明矣然蒙汗未詳何義先友山田宗俊云蒙汗即悶之反切猶秀之為唧溜團之為突欒之類豫昧於韻學未知此説為得否何培元本草必讀云蒙汗藥煙草子所造煙草豈宋元時得有之又祕方集驗云蒙汗藥俗呼燒悶香不知亦是何物後閲史搢臣願體集云旅店臨臥置水榻前以防悶香又鄭仲夔耳新云昔有客投河北逆旅室中紙糊甚密俄一女子過前言煙來伏地者再夜久果有煙因憶女子言得不死明日白官捕設媒者娶女子以去嘗聞失火之家須匍伏而遁不則難出於煙又有銜水以御之王兆云揮麈新談亦載一事全與此同蓋此燒悶香也然水滸傳蒙汗藥皆置酒中無毒煙薰死事則集驗之説恐妄耳金箔治杖瘡四朝聞見録云王涇頗宗繼先術亦有奇驗然用藥多孟浪高宗居北宮苦脾疾涇誤用瀉藥竟至大漸孝宗欲戮之市朝憲聖以為恐自此醫者不敢進藥止命天府杖其背黥海山涇先懷金箔以入既杖則以傅若未受杖者邦俗打撲腫疼亦傅金箔未無所自也丹藥程宗衡釋方云丹丸之大者也程涓千一疏云丹單也一方治諸病之謂豫按二説皆非也趙與峕賓退録引王思誠翠虛篇序云採時喚為藥煉時喚為火結時謂之丹又聖濟總録云丹者烹煉而成有一陽在中之義丸者取其以物收攝而已今以火煉及色赤者為丹非煉者為丸又按抱朴子云仙藥之上者丹砂陶弘景丹云丹即硃砂也蓋以方士多煅煉服餌凡諸石煅煉之物泛然稱之丹後草藥如控涎丹亦稱之丹竟無知其所由焉六一泥仙丹以六一泥封之火之始見抱朴子金丹卷未言六一泥是為何物黃白卷云以蚓螻土及戎鹽為泥泥釜外此蓋六一泥千金而降其方漸繁然六一泥唯取其堅固使藥氣不泄耳按商浚博聞類纂云凡爐火中用鹽泥乃是鹽爛研細自然成泥一名六一泥六與一皆水數也鹽泥固濟醫家常為之而其知為六一泥者殆希矣本草述云六味同為末故云六一泥非刀圭陶氏本草序例云刀圭者十分方寸匕之一準梧桐子大醫心方引範汪方云二麻子為一小豆三小豆為一梧實二十黍粟為一簪頭三簪頭為一刀圭外臺刪繁車前草湯方後云一刀圭者準丸如兩大豆大漢律曆志注云六千四黍為一圭按數説似異而其實大抵同董谷碧里雜存云按晦翁感興詩刀圭一入口白日生羽翰然學者皆不知刀圭之義但知其為妙藥之名耳嘉靖十四年八月晦日忽悟刀圭二字甚痛快不知古人亦嘗評及此否前在京買得古錯刀三枚京師人謂之長錢云是部中失火煨燼中所得者其錢形正似今之剃刀其上一圜正似圭璧之形中一孔即貫索之處蓋服食家舉刀取藥僅滿其上之圭故謂之刀圭言其少耳刀即錢之別名布也泉也錯也刀也皆錢之類也我年號款識殆漢物乎又按千金太乙神明丹方後云凡言刀圭者以六粟為一刀圭一説云三小豆為一刀圭據以上諸説六粟疑是六十粟之訛三建程氏釋方云附子川烏天雄性燥而悍烈乃雄健之藥也又陶隱居云三種本出建平故謂之三建蘇敬則辨陶之非謂建乃堇之訛蓋堇烏頭苗耳亦未為得也又周草窗癸辛雜志云川烏建上頭目虛者主之附子建中脾胃寒者主之天雄建下腰腎虛憊者主之豫按仲景有建中湯果如雜志之言則當曰建三湯而不可曰三建湯也嘗讀謝靈運山居賦云二冬並稱而殊性三建異形而同出自注三建者附子天雄烏頭三建之名蓋其來尚矣偶檢韻書建根一聲巢源瘡根一名瘡建本草毛茛一名毛建因竊疑三建或是三根之謂王晉三古方選注云三生飲方中南星作虎掌云肘後方名三建湯附子小而叢生者為虎掌悉是天雄一裔南星亦名虎掌乃相沿之誤實非南星也按肘後不載三生飲此説殆為謬妄騙馬丹程泰之演繁露云嘗見藥肆鬻腳藥者榜曰騙馬丹歸檢字書其音為匹轉且曰躍而上馬通典曰武舉制土木馬於裡閭間教人習騙始悟騙之為義豫按神仙遺論便毒一名騙馬墜蓋亦取義於此薛蔚西廂注騙馬盜賊之屬誤也中毒昏眩陸粲庚已編云盛御醫寅一日晨入徹藥房忽頭痛昏眩欲絶群醫束手莫知何疾敕募人療治有草澤醫人請見投藥一服逡巡即愈上奇之召問所用何方對曰寅空心入藥室卒中諸藥之毒能和諸藥者甘草也臣用是為湯以進耳非有他術也上詰寅果未晨饔而入乃厚勞其人云龔氏回春載藥室家人正銼藥忽仆地不省人事此非病也必藥氣薰蒸中於藥毒令與甘草煎湯灌之立醒都本於此
