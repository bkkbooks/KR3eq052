body:
  text: 卷上神農嘗藥孟子載為神農言者許行而不言及醫藥神農嘗百草制醫藥世多引淮南子為證余嘗考淮南文殊不然矣曰古者民茹草飲水採樹木之實食贏蠬之肉時多疾病毒傷之害於是神農乃教民播種五穀相土地宜燥濕肥墝高下嘗百草之滋味水泉之甘苦令民知所避就當此之時一日而遇七十毒此其嘗百草為別民之可食者而非定醫藥也乃神農之所以稱農也陸賈新語曰民人食肉飲血衣皮毛至神農以為行蟲走獸難以養民乃求可食之物嘗百草之實察酸苦之味教民食五穀亦可以證矣而其云神農定百藥者昉見世本太平御覽引而鄭玄周禮注神農子儀之術蓋其說之來尚矣而孔叢子云伏羲嘗味百藥乃在神農之前楊朱云五帝之事如覺如夢矧於三皇之事要之不可知亦不可窮而已及讀劉青田醫說曰天地闢而人生蠢蠢焉聖人出而後異於物於是垂衣裳造書契作為舟車網罟弧矢杵臼之器載在易經不可誣也凡可以前民用者聖人無不為之而況於醫乎辨陰陽於毫毛決死生於分寸其用心之難又豈直舟車網罟弧矢杵臼而已哉吾固有以知其作於神農黃帝無疑也此言極是藝窗私志至謂神農聞獸語而知藥怪誕極矣先天后天先天后天在易則不過論大人之德矣而干寶周禮注云伏羲之易小成為先天神農之易中成為中天黃帝之易大成為後天似無謂焉逮至宋儒以伏羲之易為先天以文王之易為後天遂作之圖最無謂也元明以來醫家亦立元氣先後天之目牽強殊甚然其理則固有焉經云真氣者所受於天與穀氣並而充身也三陰三陽太少陰陽原是四時之稱董仲舒云春者少陽之選也夏者太陽之選也秋者少陰之選也冬者太陰之選也易乾鑿度云易始於太極太極分而為二故生天地天地有春秋冬夏之節故生四時虞翻解易則云四象四時也而後世說易者專用此論蓍策之數矣以陽明厥陰合稱三陰三陽者醫家之言也靈樞云兩陰交盡故曰厥陰王冰注素問云厥盡也按厥蹶同漢食貨志師古注蹶盡竭也又按晏子云陰冰厥陽冰厚五寸厥字蓋與此同義也兩陰合於前故曰陽明而後世運氣家強以此為天之六氣矣內經之文似諸書余嘗著素問解題一篇論其為漢人之作證以前賢之數說頃刀圭之暇翻繹子史文間有與此相似古人雖不必剽襲然足觀時世之所以令然茲舉其一二以證非典謨以前之筆矣上古天真論云美其食任其服樂其俗老子八十章云甘其食美其服安其居樂其俗又云以酒為漿漢書鮑宣傳漿酒藿肉四氣調神論云渴而穿井戰而鑄兵晏子春秋云臨難而遽鑄兵噎而遽掘井陰陽應象大論云因其輕而揚之因其重而減之因其衰而彰之呂氏春秋盡數篇云精氣之來也因輕而揚之因走而行之因美而良之陰陽別論云一陰一陽結謂之喉痹春秋繁露云陰陽之動使人足病喉痹六節藏象論云立端於始表正於中推余於終而天度畢矣文元年左傳云先王之正時也履端於始舉正於中歸餘於終又云草生五色五色之變不可勝視草生五味五味之美不可勝極孫子兵勢篇云聲不過五五聲之變不可勝聽也色不過五五色之變不可勝觀也味不過五五味之變不可勝嘗也此語又見文子脈要精微論云陰盛則夢涉大水恐懼陽盛則夢大火燔灼陰陽俱盛則夢相殺毀傷上盛則夢飛下盛則夢隨甚飽則夢豫甚飢則夢取列子穆王篇云陰氣壯則夢涉大水而恐懼陽氣壯則夢涉大火而燔焫陰陽俱盛則夢生殺甚飽則夢與甚飢則夢取氣穴論云發蒙解惑未足以論也枚乘七發云發蒙解惑未足以言也營衛生會篇云上焦如霧中焦如漚下焦如瀆白虎通引禮運記云上焦如核中焦如編下焦如瀆本神篇云生之來謂之精兩精相搏謂之神隨神往來者謂之魂並精而出入者謂之魄所以任物者謂之心心有所憶謂之意意之所存謂之志因志而存變謂之思因思而遠慕謂之慮因慮而處物謂之智此一節全見子華子其他文勢語氣類淮南者多聶吉甫云既非三代以前文又非東都以後語斷然以為淮南王之作豈其然與巫醫人而無恆不可以作巫醫蓋巫醫唯是醫已周禮有巫馬即馬醫汲冢周書鄉立巫醫具百藥以備疾災畜五味以備百草呂覽云巫醫毒藥逐除治之故古之人賤之為其末也後漢許楊及王莽篡位乃變姓名為巫醫逃匿它界皆非巫與醫之謂山海經開明東有巫彭巫抵巫陽巫履巫幾巫相郭璞注云皆神醫也世本曰巫彭作醫楚辭曰帝告巫陽又呂氏春秋巫彭作醫世本巫咸堯臣也以鴻術為帝堯之醫說苑云上古之為醫者曰苗父苗父之為醫也以營為席以芻為狗北面而發十言耳請扶而來輿而來者皆平復如故素問有移精變氣論上古之醫必為祝由則所以有巫醫之稱也伊尹湯液皇甫謐甲乙經序云伊尹以元聖之才撰用神農本草以為湯液蓋伊尹負鼎言負才也乃謂庖人遂作湯液原出於卮寓而後人取附會耳素問有湯液醪醴論俞跗治病不以湯液醪釃並非湯藥之謂而漢書藝文志湯液經法十六卷豈伊尹所作耶活人書桂枝加葛根湯方後云伊尹湯液桂枝湯中加葛根今監本用麻黃誤矣又衛生寶鑑伊尹湯液論云大黃黃連瀉心湯三味今監本無黃芩脫落之也所謂湯液雖今無傳其出於後人依託明矣醫學晉以上無醫學之設及劉宋元嘉二十年太醫令秦承祖奏置醫學以廣教授後魏及隋有太醫博士助教唐貞觀三年九月諸州置醫學開元元年諸州置助教十一年諸州置醫學博士宋醫學隸大常寺神宗時始置提舉判局官及教授一人學生三百人政和五年正月州縣置醫學元世祖中統二年夏五月太醫院使王猷吉言醫學久廢後進無所師授竊恐朝廷一時取人學非其傳為害甚大乃遣副使王安仁授以金牌往諸路設立醫學吳澄宜黃縣三皇廟記云醫有學學有廟廟以祀三皇肇自皇元前所未有也夫上古聖人繼天心立民命開物創法以為天下利至於今賴之者莫如三皇也然歷代以來未聞立廟以祀唐天寶間制立三皇廟與五帝廟同置命有司以時祭享蓋曰祠古聖云爾非如今日醫學之專廟特祭也當今路州府縣儒學有孔子廟皆因其舊醫學立三皇廟與儒學孔子廟等則新制也乃知醫學之制至於元而始備矣明初置醫學提舉司設提舉副提舉醫學教授學生官醫提領等官尋改為太醫監設少監監丞吳元年改監為院設院使同知院判典簿等官而各地醫學府正科一人州典科一人縣訓科一人然似不如元之重醫學也故丘濬大學衍義補云今世之業醫者挾伎以診療者有之矣求其從師以講習者何鮮也我太祖內設太醫院外設府州縣醫學醫而以學為名蓋欲聚其人以斆學既成功而試之然後授以一方衛生之任由是進人以為國醫其嘉惠天下生民也至矣臣願究成周所以謂之醫師國朝所以立為醫學之故情擇使判以上官聚天下習醫者俾其教之養之讀軒岐之言研張孫之枝試之通而後授之職因其長而專其業稽其事以制其祿則天下之人皆無夭閼之患而躋仁壽之域矣是亦王者仁政之一端也今依此言而推之當時醫學之衰廢可以知也而嘉靖十五年建聖濟殿於文華殿後以祀先醫二十二年從侍醫之請又建景惠殿於太醫院以祀先醫令大臣春秋主祀蓋未始於醫學建三皇廟也清因之雍正元年覆准行文直省巡撫查所屬醫生詳加考試課有類經注釋本草綱目傷寒論三書者指名題請授為醫學官教授每省設立一員准其食俸三年如果勤慎端方貢入太醫院授為御醫凡所屬州縣衛習醫人令其訪明考試即將三書教習有精通醫理者呈報巡撫給咨太醫院考試上者授以吏目醫士等官其有年力不能赴京者留為本省教授待缺其致祭三皇於太醫院之景惠殿順治元年定儀注詳出會典然醫學之制未得其詳享和癸亥冬蘇門民醫胡振兆新來寓於崎岙因使譯官問之胡乃覆曰儒學者設立教官專管在學諸生衙署學宮之傍凡讀書人考取秀才則知府知縣送入學內教官迎進拜孔聖後即拜教官為老師所謂進學之稱也醫學者不過本地醫家寒士寂寞官長強點充任雖名醫官實以備承應傳喚兼治罪犯之人每年俸谷無多仍可在家診治並無學宮亦不課教子弟蓋閭閻醫士一切衙門俱不承應俱讀書人為多官長延請須用名帖所以醫學之不屑為也三皇廟者寺院也非學也有道士承應供奉醫家朔望進香此蓋就蘇門一地而言之如兩直隸恐不如此也三皇廟洪武四年詔曰三皇繼天立極開萬世教化之原汨於藥師可乎天下郡縣毋得褻祀而至嘉靖二十二年建三皇廟於太醫院北名景惠殿又至隆慶四年禮部侍郎王希烈建言三皇既祀於歷代帝王廟又祀於文華東室乃又雜之醫師使共俎豆不亦瀆且褻乎且官廨中止宜有祠不宜有殿穆宗不欲改先帝之制報罷萬曆十八年詹景鳳修南京太醫院三皇廟謂三皇之稱於醫無取更額曰聖醫廟事詳於其所匯刻醫學集覽序按聖醫廟之稱為協其實焉然今清朝猶仍元明之舊制醫科醫之立科歷代不同周四科疾醫瘍醫食醫獸醫見周禮唐七科體療少小耳目口齒角法按摩咒禁見六典宋設三科教之曰方脈科針科瘍科見選舉志又太醫局有丞有教授有九科見職官志而九科無考金十科亦無考矣元十三科大方脈雜醫科小方脈科風科産科兼婦人雜病科眼科口齒兼咽喉科正骨兼金鏃科瘡腫科針灸科祝由科見輟耕録案得效方同唯除祝由科輟耕録云出聖濟總録今聖濟無考可疑續文獻通考無風科婦人産科為一科有傷寒科按摩科事物紺珠古十三科更有獸醫又名牛醫明十三科大方脈科傷寒科小方脈科婦人科口齒科咽喉科外科正骨科痘疹科眼科針灸科出明會典按鄭曉吾學編十三科曰大方脈曰小方脈曰婦人曰瘡瘍曰針灸曰眼曰口齒曰接骨曰傷寒曰咽喉曰金鏃曰按摩曰祝由按摩以消息導引之法除人八疾祝由以咒禁祓除邪魅之為厲者二科今無傳考會典凡十一科乃除按摩祝由二科也古今醫統古十四科更有脾胃科李樓小仙雜録與吾學編同無按摩科以口齒咽喉為一科有風科養生科清十一科曰大方脈小方脈傷寒科婦人科瘡瘍科針灸科眼科口齒科咽喉科正骨科痘疹科今痘疹歸小方脈咽喉口齒共為一科現設九科見清會典王子接十三科古方選注傷寒科內科女科外科幼科痘疹科眼科咽喉科折傷科金鏃科祝由科符禁科此十二科缺針灸科王棠知新録無金鏃按摩祝由有痘科疹科分針與灸為二科未知何據也呂元膺論醫呂元膺論歷代諸醫其文仿梁袁昂書評體譬喻切當為後學之楷則其言曰扁鵲醫如秦鑑燭物妍媸不隱又如奕秋遇敵著著可法觀者不能測其神機倉公醫如輪扁斫輪得心應手自不能以巧思語人張長沙醫如湯武之師無非王道其攻守奇正不以敵之大小皆可制勝華元化醫如庖丁解牛揮刀而肯綮無礙其造詣自當有神雖欲師之而不可得孫思邈醫如康成注書詳制度訓詁其自得之妙未易以示人味其膏腴可以無飢矣龐安常醫能啓扁鵲之所祕法元化之可法使天假其年其所就當不在古人下錢仲陽醫如李靖用兵度越縱舍卒與法會其始以顱囟方著名於時蓋因扁鵲之因時所重而為之變爾陳無擇醫如老吏斷案深於鞠讞未免移情就法自當其任則有餘使人代治則繁劇許叔微醫如顧愷寫神神氣有餘特不出形似之外可摸而不可及張易水醫如濂溪之圖太極分陰分陽而包括理氣其以古方新病自為家法或者失察剛欲指圖為極則近乎畫蛇添足矣劉河間醫如橐駝種樹所在全活但假冰雪以為春利於松柏而不利於蒲柳張子和醫如老將敵對或陳兵背水或濟河焚舟置之死地而後生不善效之非潰則北矣其六門三法蓋長沙之緒餘也李東垣醫如獅弦新絙一鼓而竽籟並熄膠柱和之七均由是而不諧矣無他希聲之妙非開指所能知也嚴子禮醫如歐陽詢寫字善守法度而不尚飄逸學者易於摹仿終乏漢晉風張公度醫專法仲景如簡齊賦詩每有少陵氣旨王德膚醫如虞人張羅廣絡原野而脫兔殊多詭遇獲禽無足算者見戴九靈滄州翁傳天醫范成大問天醫賦序云案晉書捲舌六星其一曰天讒主巫醫而孫氏千金書以日辰推天醫所在其是歟田汝成西湖志云天醫院錢唐名醫朱應軫建以奉陶吳許三真君錢希言獪園云天醫有十三科今在天曹屬陶許兩真人職掌月令廣義引潛居録云八月朔古人以此日為天醫節祭黃帝岐伯壽域神方有八代天醫名銜解臚穿胸抱朴子淳于解臚以理腦又初學記引抱朴子云文摯愆筋以療危困仲景穿胸以納赤餅王冰寶命全形論壞府注引此文又皇甫謐釋勸論岐伯剖腹以蠲腸乃不特俞跗華他能斯術扁鵲墓酉陽雜俎云盧城之東有扁鵲冢云魏時針藥之士以卮臘禱之所謂盧醫也范成大攬轡録云伏道有扁鵲墓墓上有幡竿人傳云四傍土可以為藥或於土中得小圓黑褐色石可以治病徐氏筆精可療飢疑傳聞之訛石湖集載其詩云活人絶技古今無名下從教世俗趨墳土尚堪充藥餌莫嗔醫者例多盧樓攻愧北行日録云乾道五年十二月十四日車行四十五里過伏道望扁鵲墓前多生艾功倍於他艾王兆云揮麈新談云扁鵲墓在河間任丘縣其祠名藥王祠前有地數畝病者禱神乃以珓卜之許則云從其方取藥如言掘土果得藥服之無弗愈者其色味不一四方來者日掘千窟越宿俱平壤矣文安王公守蘇為陸給事子俞言如此朱國禎湧幢小品云鄚州土城無門扉相對如闕中有藥王廟王即扁鵲州人也封神應王神廟玉體違和慈聖皇太后禱之立奏康寧為新廟建三皇殿於中以歷代之能醫者附焉周石匏東京考云扁鵲墓在閶闔門外西北菩提東原在子城內唐元和十五年宣武節度使張弘靖徙葬於此相傳四傍土可以為藥禱而求之或得丸如丹劑神仙通鑑云扁鵲死於商都之陰時年九十七陽厲趨至死所哀哭殮葬於路旁有病者至墓禱求撮土煎湯服之即愈或得小丸如丹雖危證可救墓旁多生艾草能灸百病後人為之立廟吳震芳述異記云山西潞城縣民病不服藥亦無醫縣南十餘里有盧醫山上有盧醫廟皆石壁石柱石瓦遠近病者持香燭楮錢請廟通籍貫述病緣用黃紙空包壓香爐下禱畢紙包角動開視得紅丸者入口病即愈白丸者淹纏數日可愈病不起者無藥再四瀆焉即與黑丸服之亦死無益也廟門夜有二黑虎守之傍晚即相戒不敢上山矣按諸書所載如此雖是理之渺茫者大抵不得死於當時而其遺靈赫赫於千載之後者關壯繆嶽武穆之儔皆是若我扁鵲其技實曠古一人而遂為醯被殺其亦宜如此不足深怪也元好問嘗作扁鵲廟記詳論此事近沈歸愚德潛亦有題扁鵲墓詩云蕩蕩蕩陰里荒荒扁鵲墓積此終古恨草生不復青當年活人多到處留令名活人轉見殺忌者爭相傾毋怪後世醫庸庸保其生又陶西圃鏞詩云一壞尚起膏肓疾九死難醫嫉妒心又乾隆御製有數首黃帝時有倉公嵇康養生論李善注云經方小品倉公對黃帝曰大豆多食令人身重豫謂此陳遠公石室祕録之祖泊宅編漢武帝病渴仲景為八味丸已任編張仲景立八味丸治漢元帝三陰瘧疏謬亦甚三折肱王棠知新録云三折肱知為良醫謂屢折其臂能參考其方之優劣也後人謂三次曲肱而思慎於下藥此說非也楚辭九章云九折臂而成醫兮吾今而知其信然豈亦下藥而用丸次思索乎簡按據王氏此說三蘇暫切去聲三字九字皆虛用作實數也屢折其臂即折傷之義於下傳原文為確當焉陸儼山解孟子折枝云枝肢古通用折枝猶折腰也折腰敬長即孩提常事於長者義親切知後說折字乃與折腰之折同義似不穩當參方之優劣見孔叢子梁丘據遇虺毒章孔子語以偏得名醫說載藏用匣中三斛火陳承篋里一盤冰六帖陳承作劉寅浙江通志云嚴觀仁和人不拘古方頗有膽略用薑汁製附子是以用獲奇效人稱之曰嚴附子倘湖樵書云近有陳姓醫人不問何疾專用石膏時人呼為陳石膏又會稽縣志云張介賓號景嶽年十三隨父至京學醫於金英盡得其傳暇即研窮書史醫法東垣立齊喜用熟地黃人呼為張熟地此皆以偏得名也王叔和程郊倩後條辨詆王叔和書其字而鄭漁仲氏族略王叔姬姓周襄王之子王叔虎之後也然則王叔氏和其名亦不可知也清儲大文存研樓集云今王叔和墓在峴山下未知地志有載此者否王冰李濂醫史王冰一作王砯乾隆四庫總目云冰名見新唐書宰相表稱為京兆府參軍林億等引人物志謂冰為太僕令未知孰是然醫家皆稱王太僕習讀億書也其名朝公武讀書志作王砯杜甫集有贈重表侄王砯詩亦復相合然唐宋志皆作砯而世傳宋槧本素問亦作冰或公武因杜詩而誤歟豫按朝公武讀書志作王砯沈作哲寓簡戴侗六書故之類並同而考杜詩作王砅砯披冰切音砰砅理罽切厲同即深則厲之厲砯砅字遞別作次注者疑非杜之重表侄然寶應之時杜猶在與王冰同時況砅砯一點之差則其果然否亦不可知也朱葛齊名陸採都公談纂云元江浙行省有某平章者將之任道間忽染中風四肢不舉延吾鄉葛可久治之可久登其舟金華朱彥修先在二公素相聞而不相識見之甚歡乃共脈平音彥修曰疾已殆不可藥矣可久曰吾固知其殆然尚有一針法彥修曰君之針第可運其二肢無益也左右強可久針針入如彥修之言彥修問平章家道里遠近以指計之謂左右曰即回尚可抵家稍遲無及矣後平章還果以及門而卒又徐禎卿異林雲朱彥修嘗治浙中一女子瘵且愈頰上兩丹點不滅彥修技窮謂主人曰須吳中葛公耳然其人雄邁不羈非子所致也吾遣書往彼必來主人悅具供帳舟楫以迎使至葛公方與衆博大叫使者俟立中庭葛公瞪目視之曰爾何為者使者奉牘跪上之葛公省書不謝客行亦不返舍遂登舟比至彥修語其故出女子視之可久曰法當刺兩乳主人難之可久曰請覆以衣援針刺之應手而滅主人贈遺甚豐可久笑曰吾為朱先生來豈責爾報邪悉置不受按二書所載葛朱之技自無軒輊焉而明世說則曰葛脈一人曰子三年疽發背不救矣朱教以曰飲梨汁不致大害後果無恙葛知其故嘆曰竟出朱公下何醫為悉取平生所論著焚之曰留之適以禍人此與夷堅志所載楊吉老茅山道士之事相類疑歸美於朱之溢談耳運氣運氣之宗昉於素問見褚澄遺書褚南齊人然則運氣之混於素問在於六朝以前乎褚書蓋蕭淵所依託得於古冢中雲者乃欲托汲冢古書耳隋蕭吉作五行大義上自經傳下至陰陽醫卜之書凡言涉五行者莫不網羅搜輯焉特至五運六氣勝復加臨之義則片言隻字無論及者其起於隋以後確乎可知矣而其說湊合緯醫二書所立正是一家未知創於何人豈所謂玄珠先生者乎但至王冰採而闌入素問篇內其說始顯然竟唐代猶未聞有言之者後及宋劉溫舒沈括楊子建輩篤信之精詣其理各有所發明而當時泗州楊吉老嘗謂黃魯直曰五運六氣視其歲而為藥石雖仲景猶病之也此言極是伊川朱子亦嘗論其淺近焉而傷寒論卷首所載運氣諸圖未知出於何人之手黃仲理云南北二政三陰司天在泉寸尺不應交反脈圖並圖解運氣圖說出劉溫舒運氣論奧又六氣上下加臨補瀉病症圖並汗差棺墓圖歌括出浦云運氣精華又五運六氣加臨轉移圖並圖說出劉河間原病式後人採附仲景傷寒論中夫溫舒浦云守真三家之說豈敢附於仲景之篇特後人好事者為之耳繆仲淳論運氣云豫從敝邑見趙少宰家藏宋版傷寒論皆北宋善版始終詳檢並未嘗載有此說六經治法之中亦並無一字及之子乃諦信豫見之不謬而斷為非傷寒外感之說按趙少宰蓋趙開美與仲淳同海虞人今所傳宋版傷寒論乃繫於開美翻鏤而無運氣諸圖正與仲淳言符矣豫家藏元板成無忌注解本亦不載此諸圖知是出成氏以後之人也對脈舊唐書柳太后病風不能言脈沉而口噤新唐書作脈沉而難對按宋太平老人袖中錦云宮中以診脈為對脈蓋難對謂脈沉伏而診得之難也又唐裴庭裕東觀奏記云上宣宗自不豫宰輔侍臣無對見者瘡甚令中使往東都太僕卿裴詡宣索藥中使往返五日覆命召醫瘡方士院士對於寢殿院言可療既出不復召矣所謂對於寢殿亦診脈於寢殿也息數不同人一日一夜凡一萬三千五百息方以智云窮之蓋洛書之數也而考諸書其數不一張景醫說一萬三千五百二十息小學紺珠引胡氏易說一萬三千六百餘息朝鮮金悅卿梅月堂集云人一日有一萬三千六百呼吸一呼吸為一息則一息之間潛奪天運一萬三千五百年之數一年三百六十日四百八十六萬息天經或問二萬五千二百息呂藍衍言鯖云一氣之運行出入於身中一時凡一千一百四十五息一晝夜計一萬三千七百四十息釋氏六帖引詈意經云一日有三萬六千五百息也何夢瑤醫編云內經曰脈一日一夜五十營營運也經謂人周身上下左右前後凡二十八脈共長一十六丈二尺五十運計長八百一十丈呼吸定息脈行六寸一日夜行八百一十丈計一萬三千五百息按此僞說也人一日夜豈止一萬三千五百息哉據何之言佛說西說並多於一萬三千五百未知以何為實數也輕身延年論衡云道家或以服食藥物輕身益氣延年度世此又虛也夫服食藥物輕身益氣頗有其驗若夫延年度世世無其效百藥愈病病愈而氣復氣復而身輕凡人稟性身本自輕氣本自長中於風濕百病傷之故身重氣劣也服食良藥身氣復故非本氣少身重得藥而氣乃長身更輕也稟受之時本自有之矣故夫服食藥物除百病令身輕氣長復其本性安能延年至於度世有血脈之類無有不生生無不死以其生故知其死也仲任之言極為直切蓋當時其說盛行故具論如此陶隱居云本草後漢時書今閲之無藥而不有延年輕身之說者時勢令然也藥物所出陶弘景雲本經所出郡縣乃後漢時制疑仲景元化等所記又顏氏家訓云本草神農所述而有豫章朱崖趙國常山奉高真定臨淄馮翊等郡縣名出諸藥物由後人所羼非本文也又證類本草滑石條云赫陽縣先屬南陽漢哀帝置明本經所注郡縣必是後漢時也今考本經一無言所出者惟女蘿柳華二條僅有焉蓋慎微修證類時誤為黑字耳及時珍作綱目猶且不察以舊經所載地名為別録文此襲證類之誤也唯太平御覽所引神農本草經每藥下載所出地名且文字與盧復本頗異此乃舊經之文矣王冰引月令寓簡云王砯注素問敘氣候仲春有芍藥榮季春有牡丹華仲夏有木槿榮仲秋有景天華皆今月令曆書所無又以桃始華為小桃華王瓜生為赤箭生苦菜秀為吳葵華戊寅歷皆有之按朝公武讀書志唐月令一卷唐明皇改黜舊文附益時事號御刪月令升為首卷意是王氏所引乃唐月令而已郎瑛以為淮南文田藝蘅以為僞撰俱不考耳背陽腹陰金匱真言論云言人身之陰陽則背為陽腹為陰或曰陰陽二字互誤已人南面則腹乃為陽背乃為陰老子曰萬物負陰而抱陽又陰陽離合論曰聖人南面而立前曰廣明後曰大沖況於其文南主夏故腹字從夏肉背為北故背字從北肉朱子云天地東西南可見而北不可見人之瞻視亦前與左右可見而背不可見此皆其明證也豫謂此說不必也凡物有體質有功用以功用言則背陰腹陽也而以體質言背陽腹陰也蓋天地之道大為陽小為陰高為陽卑為陰外為陽內為陰易云立天之道陰與陽立地之道剛與柔又云乾剛坤柔今夫以大小視之背大而腹小以高卑視之背位於上而有覆幬之勢乃天之象腹居於下而有受載之形乃地之象以剛柔外內言之背剛堅而在於外腹柔軟而在於內且男生而覆女生而仰其溺水亦然背為陽腹為陰而陽經行於背陰經行於腹者體質之勢也人之於走獸飛禽魚鱉蟲豸之屬雖伏走飛翔浮游蚑行其狀各異然至其稟天地陰陽之氣各具其體則一也今夫背陰腹陽於人猶可言耳至如走獸飛禽魚鱉蟲豸之屬謂之背陰腹陽而可邪且如背字說文云從北肉聲然如腹字則偏旁從夏而非夏況易以腹為坤豈可為夏肉乎夏肉果為腹則背字當是冬肉北肉果為背則腹字當是南肉滑是水之骨坡是土之皮字學家說豈足據乎豫因謂背腹陰陽有功用體質之別必不可拘於一說矣動氣近有傳荷蘭學者云人脊骨裡面有一條大動脈乃百脈之源也揣人腹上惻惻跳手者即其動也豫考靈素已有其言不特昉於荷蘭焉按五音五味篇云衝脈循背裡為十二經之海歲露篇云衛氣之行風府日下一節二十一日下至尾骶二十二日入脊肉注於伏沖之脈瘧論作伏膂之脈天真論云太衝之脈盛月事以時下全元起太素甲乙並作伏沖之脈盛逆順肥瘦篇云夫衝脈者五藏六府之海也五藏六府皆稟焉海論云夫衝脈者五藏六府之海也動輸篇云衝脈者十二經之海也與少陰之大絡起於腎靈素諸篇所論如此曰衝脈曰伏沖曰大沖曰伏膂之脈皆其所謂大動脈者是也則亦其所謂百脈之源者是也又百病始生篇云虛邪之中人也其著於伏沖之脈者揣之應手而動舉痛論云寒氣客於衝脈衝脈起於關元隨腹直上寒氣客則不通脈不通則氣因之故喘動應手喘蠕音通此論其動之發於外者所謂動氣是也噫經言何有所無乃知不昉於荷蘭矣又嘗考呂廣注難經腎間動氣云氣衝之脈者起於兩腎之間主氣故言腎間動氣按所謂五藏六府之本十二經之根與靈樞云五藏六府之海十二經之海者所指必同且陰陽離合論云太衝之地名曰少陰動輸篇云與少陰之大絡起於腎則呂氏之說有所據焉今驗之衝脈之見有虛實之分凡人之腔里一處有罅隙之地則脈動發泄或左或右虛之所在隨而應手焉而又其有食積留飲痃癖癥瘕等物則物與脈相抵觸實之所在亦隨而應手焉傷寒論原於十六難立動氣在於左右上下者不可汗下之戒蓋其一端已記性汪訒庵云金正希先生嘗言人之記性皆在腦中凡人外見一物必有一形影留在腦中小兒腦未滿老人腦漸空故皆健忘愚思凡人追憶往事必閉目上瞪而思索之此即凝神於腦之意也出於本草備要辛夷注王惠源醫學原始亦云人之一身五藏藏於身內止為生長之具五官居於身上為知覺之具耳目口鼻聚於首最顯最高便與物接耳目口鼻之所導入最近於腦必以腦先受其象而覺之而寄之而剖之而存之也故云心之記正記於腦耳黃庭內景亦言腦為泥丸宮元神居焉是必有本何惑之有豫按荷蘭說人之精神在於腦中故人斷頭立死亦與內景之說符矣而五雜俎談薈載頭斷而不死者數則此皆人妖耳解剖藏府朱載堉律學新說云岐伯曰夫八尺之士皮肉在此外可度量切循而得之其死可解剖而視之蓋太古時風俗淳朴死則棄之於野初無衣衾棺槨之葬故使為醫術者可得剖而視之亦無所禁後世聖人取諸太過之象始制棺槨由是之後國有殘毀尸體之禁無敢剖而視之者以此推之知彼醫經其來之遠又奚止於三代而已此說非也趙與峕賓退録云廣西戮歐希範及其黨凡二日剖五十有六腹宜州推官靈簡皆詳視之為圖以傳於世王莽誅翟義之黨使太醫尚方與巧屠共刳剝之量度五藏以竹筵導其脈知所始終云可以治病然其說今不傳又朝公武郡齊讀書志載存真圖一卷皇朝楊介編崇寧間泗州刑賊於市郡守李夷行遣醫並畫工往視決膜摘膏肓曲折圖之盡得纖悉介校以古書無少異者比歐希範五藏圖過之遠矣實有益醫家也又聞見後録載無為軍醫張濟能解人而視其經絡則無不精因歲飢疫人相食凡視一百七十人以行針無不立驗按明程式亦嘗解倭人檢視藏府詳見其醫彀中近世斯邦醫家亦好剖解驗以荷蘭內景書頗極精微然有益於外科而無裨於內科矣少腹王冰注氣交變大論云少腹謂臍下兩傍髎骨內也劉熙釋名云自臍以下曰水腹水汋所聚也又曰少腹少小也比於臍上為小也病源候論以少腹為𦣀腹未詳何義玉房病源候論玉房蒸男則遺瀝女則月候不調又曰精藏於玉房交接太數則失精玉房未知何處明李君實紫桃軒雜綴云銅人針灸圖載藏府一身俞穴有玉環俞不知玉環是何物張紫陽玉清金華祕文論神仙結丹處曰心下腎上脾左肝右生門在前密戶居後其連如環其白如綿方圓徑寸包裹一身之精粹此即玉環也醫書論諸種骨蒸有玉房蒸亦即是玉環其處正與臍相對人之命脈根蒂也按今針灸圖玉環作白環性命之根陸文量菽園雜記云回回其俗善保養者無他法惟護外腎使不著寒見南人夏著布褲者甚以為非恐涼傷外腎也云夜臥當以手握之令暖謂此乃生人性命之本根不可不保護此說最有理張文潛明道雜志云洛陽劉幾年七十餘精神不衰體干清健猶劇飲豫素聞其善養生因問之曰暖外腎而已以兩手掬而暖之默坐調息至十息兩腎融液如泥瀹入腰間此術至妙馮夢禎快雪堂集與何民部書云昨視丈病體大都虛火上騰火降即安矣弟所善方士張君善用救命索其法惟緊縛外腎雖垂絶之症可以立蘇現有一人症與丈同行此法而愈試驗非一特為送致諸努力珍護以待平復祝允明蘇談云口瘡無問新舊遇夜臥將自己兩睪丸以手櫪緊左右交手揉三十五遍每夜睡覺輒行之愈於服藥諸書所載如此豫聞北人冒雪而行必以稻稈打揉包外腎必不凍死又人多誤撲損外腎立殞者乃其為性命之本根明矣然宮刑男子割勢勢外腎也韻會云外腎為勢刑德經云勢陰核也折骨分經云外腎睪丸也李時珍綱目人部載人勢為陰莖未見所本所謂宦者去其宗筋是也而騸馬䆠牛羯羊閹豬潔雞善狗淨貓之屬事物紀原云漢文始閹潔六畜亦皆劇其勢者云此易肥焉又種樹書有騸樹之法人畜去其性命之本根而不死者猶樹木之騸而不凋枯耶豫弱冠時見一商家僕年二十餘陰囊腫痛十餘日隱忍不語人忽一日破裂失血數升昏冒困憊吐蛔五條湯藥皆嘔豫因與單甘草湯而嘔止家人以為便血方其除穢見之雙丸墜在於蓐上家人驚惶急邀外科療之凡百日許而痊尋歸其鄉於江州後數年問之江州人乃云渠今猶無恙所墜睪丸常綿裹藏於匣中若寒日啓之體忽婪栗若誤置之於高處眩瞀目顛暈苦楚叵耐蓋彼此氣之相應也枯骨寒而脛腳疼柯古雜俎嘗記之況於性命之根理宜然矣診脈借菽難經以菽況診脈之輕重前人注解率不得其旨蓋菽之在莢纍纍相連與脈動指下者相類以此意推之言三菽之重者非三菽加於寸關尺之上一指下各有一菽之重也通稱三部則三菽也六菽之重者三部各有二菽之重也九菽之重者三部各有三菽之重也十二菽之重者三部各有四菽之重也以三乘之可以見耳今如一部有三菽之重則於與皮毛相得者為甚重矣且何不言三菽四菽五菽而必以三纍加之乎弘前醫官服子溫良著難經愚得其說如此可謂發千古之祕蘊矣其書未及脫稿子溫沒殊可惋惜也手檢圖脈經第十卷首標曰手檢圖三十部明袁表校本及沈際飛本作二十一部袁後序曰末篇有手檢圖二十一部今觀其文則皆覆論十二經脈與奇經八脈三部二十四種形證所屬無圖可見豈叔和所著故有圖久不復傳耶乃宋臣林億劄中則稱世之傳授其別有三隋巢元方時行病源為第十篇以第五篇分上下而撮全經之文別增篇目者億嘗據素問九墟靈樞太素難經甲乙仲景諸書校其脫漏仍為十篇以傳則知末篇傳疑已久億但補正其文而所謂手檢圖二十一部云者直存舊目無從考證耳袁氏所論如此今閲脈經十卷之首以氣口一脈分為九道以論三陰三陽奇經之脈其義未太明且不及手三陽任督沖之六脈知是不止其圖失傳其文亦殘闕不可復尋繹焉而李東璧奇經考以手太陽合手太陰以手陽明合手太陽採脈經第二卷文增任督沖之三脈因作九道圖自謂泄千古之祕藏而猶缺手少陽之一位將何以合三十二部之數疏謬亦甚矣吳山甫云手檢圖脈法惟通融之士能知能行亦未知圖與經文既亡且缺也嗚呼一寸之口配乎五藏六府猶且太煩縱令古手檢圖如季氏所撰豈可得更辨所謂九道者以定奇經八脈之病乎前年有人問於豫者因以此答焉詹王論脈詹東圖明辨類函云醫者之審病曰望曰聞曰問曰切蓋以切脈驗之望問聞也先審之有形聲以終審之無形聲內外本末具知之矣脈之有浮沉弦數固矣然浮沉弦數之中其端各又至煩苟非問以證聞聞以證望原始要終以求其是既參又伍以求其當脈之所指冥冥雖求必失之矣古人置切脈於望問之終非謂其症斷盡於脈耶而脈之不可無望聞問審矣又云切脈而斷之不差者所恃先有望也聞也問也豫謂問尤急焉欲得其身之所疾病與疾之所自始詳在問也今之醫者自負其明故不問而切脈一以脈斷即病者欲以其故告訑訑然曰我切得之矣無煩言也如斯而得一當且為不免為幸中萬一失之如病者何故醫而自負恃不求細詳最為大病人命生死在茲可以輕試而漫投也王兆云湖海搜奇亦云脈理吾惑焉蓋自太史公作史記已言扁鵲飲上池水三十日能隔垣視見人五藏特以診脈為名則其意固可見矣今以兩指按人之三部遂定其為某府某藏之受病分析七表八里九道毫毛無爽此不但世少其人雖古亦難也世不過彼此相欺耳二氏之論宜為診家之正眼矣初學診脈初學診脈之際心以為弦則如弦既又以為緊則如緊除浮沉小大滑澀等之外皆為爾譬之靜坐聞鵓鴿聲心認脫布褲而聽之則莫聞而不脫布褲認德不孤而聽之則莫聞而不德不孤蓋心預有所期也王叔和曰心中易明指下難晰方此際洗盡胸次所蓄寓孔神於三指頭自然得矣劉菽福建通志載劉菽者邑諸生也因善病成醫醫多奇中嘗自言負病時獨居一室設木案置瓦瓶食器雞飛其上器展轉欲墜地不為動色於是療者曰病可治故其為醫也亦以此法愈人於本草丹溪肘後諸方多所發明於貧者不受謝人以此益歸之經曰精神進志意定故病可愈宜乎其病愈焉而及之於人也千金方葉夢得避暑録話云孫真人為千金方兩部說者謂凡修道養生者必以陰功協濟而後可得成仙思邈為千金前方時已百餘歲固以妙盡古今方書之要獨傷寒未之盡似未盡通仲景之言故不敢深論後三十年作千金翼論傷寒者居半蓋始得之其用志精審不苟如此今通天下言醫者皆以二書為司命也按千金傷寒門云江南諸師祕仲景傷寒要方不傳然則方其著千金前方未曾研其全書也後及撰翼方所採托亦非今所傳傷寒論其文字大抵與玉函經同知唐以前傷寒論原自非一通也翼方世多傳乾隆重刊王肯堂校本不啻誤文數行尋墨刊脫數十頁豫常恨焉聞城東白醫家藏元版豫百計索之不敢許丙午冬米價騰躍渠不能支遽欲售之豫因鬻雜書數十帙而購之乃大德乙已梅溪書院所刊文字端正首尾完備與肯堂本異豫既得之喜劇明年六月浪華木世肅孔恭不量以元版前方千里郵致以貽於是儼然雙璧始具於插架古人云好學之篤又有好書濟其求不堪欣躍聊筆於此聖濟總録政和聖濟總録二百卷宋藝文志藝文略玉海朝陳二氏並不載其目南宋諸方書未見引據者蓋此書之成在於徽宗之季年聖濟經和劑局方之後洪景盧容齊隨筆云宣和殿大清樓龍圖閣所儲書籍靖康蕩析之餘盡歸於燕考之宋史則云靖康二年少帝在青城金人盡索國子監書版三館祕閣四部書大嘗禮物大成樂舞明堂大內圖以至乘輿服御珍玩之物輦致軍前意者如此書鏤版才成未及頒布亦在其中爾後南北殊界彼此不通故南宋之士不得觀之遂至有並其目而無知者及金世宗大定中取所俘於汴都重刊頒行因傳於今矣嗚呼是書成於北宋而晦於南宋不傳於中國而存於夷狄而徽宗慈心之所寓得不泯於千載之後者抑亦奇矣清程云來云大德重校聖濟總録元朝奉詔頒行者大版大字每卷首篇署元耶律楚材五字今吉醫官及豫家所藏大德重校本亦大版大字然無元耶律楚材五字原文書法端雅蓋為宋版之舊但每卷首頁大德重校聖濟總録卷第某數字書刻並劣繫於元人改刊無疑矣活人書宋樓攻愧鑰序增釋活人書王作肅著云嘗聞之老醫京師李仁仲之子云前朝醫官雖職在藥局方書而階官與文臣同活人書既獻於朝蔡師垣當軸大加稱賞即令頒行而國醫皆有異論蔡公怒始盡改醫官之稱不復與文臣齒樓之言如此宜乎世之言傷寒者至知有活人書而不知有長沙之書也及明陶節庵六集書出焉又至並活人書而無知者今如斯邦天下莫不知有長沙之書而讀焉然而其微言大義殆熄矣儒門事親驪恕公忠嘗言儒門事親一書前三卷議論精確文亦俊逸後八卷乃體裁殊異必是別一種書或出於門人之手焉後閲心印紺珠經云子和金宛丘人氏張戴人是也有儒門事親三十篇十形三療一帙治病百法一帙三復指迷一帙治心要一帙三法六門世傳方一帙今考之於醫統正脈所收本從第一卷七方十劑繩墨訂至第三卷水解凡三十篇此即儒門事親也自第四卷至第五卷別是一書自第六至第十一乃十形三療也自第十二至第十五乃三法六門世傳方也尋借元版於西京伊良子氏而抄之凡三卷首有中統年間高鳴序及金人張頤齊序後有金人無名氏跋篇數與紺珠經所載符矣恕公沒十餘年惜不見此書焉朝鮮所輯醫方類聚多引十形三療三法六門今正脈本儒門事親中並有之妄改書名汪穎著食物本草而改為東垣食物本草王永輔著惠濟方而改為簡選袖珍方艾元英著如宜方而改為回生捷録李東璧作脈學而改為張孔受脈便程云鵬著慈幼筏而改為張介賓慈幼新書陳司成著黴瘡祕録而附之於竇夢麟瘡瘍全書凡此類不一而足皆使人眩惑乃因書估欲易售耳中風傷寒論中風乃是傷寒中之一證宋以後呼為傷風者是也而金匱中風乃靈素所謂偏枯後世中風之稱昉於此夫傷寒論金匱元是一書而同成仲景之手理宜無以一中風之名互稱兩種之疾然魏志注引曹瞞傳云魏太祖陽敗面喎口叔父怪而問其故太祖曰卒中惡風叔父以告嵩嵩驚愕呼太祖太祖口貌如故嵩問曰叔父言汝中風已差乎太祖曰初不中風魏武與仲景氏同漢末人知當時有此語又按後漢朱浮與彭寵書伯通獨中風狂走此以狂為中風後世狂風風狂心風等之稱蓋有所由均之東漢語所指遞殊不可不知也若夫後世紫白癜風落架風食迷風之類風字竟不可窮詰焉蓋風善行而數變凡病變動移易不定者以風呼之耶録以徯識者痰痰五飲之一王氏脈經作淡飲宋黃伯思法帖刊誤載初月帖中雲淡悶乾嘔淡方淡液之淡干古乾溼之干今人以淡作痰以干作乾非也豫考之佛典大般若經初分原品云身病有四一者風病二者熱病三者痰病四者風等種種雜病又唐慧琳一切經音義云淡飲徒甘反下於禁反謂胸上液也又云淡陰謂胸上液也醫方多作淡飲又云痰癊上音談下陰禁反案痰癊字無定體胸鬲中氣病也津液因氣凝結不散如筋膠引挽不斷名為痰癊四病根本之中此一能生百病皆上焦之疾也又義楚六帖云四百四病百一風百一黃百一熱百一痰等乃知後世以痰飲為諸飲之總稱以為十病九痰或百病生於痰之類皆原於內典也而痰癊二字在我醫方始見肘後乃痰飲耳而聖惠方三十六黃中有癊黃一證此即巢源所載陰黃唯從疒者與痰癊之癊自異療痔病經有癊痔蓋亦陰痔已
